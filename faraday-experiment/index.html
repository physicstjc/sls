
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faraday's Experiment</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='7' fill='%232f4f3b'/%3E%3C/svg%3E">
  <style>
    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f7faf8 0%, #e7f0eb 100%);
    }

    #simulation-container {
      width: min(720px, 100%);
      max-width: 720px;
      height: auto;
      margin: 0 auto;
      padding: 4px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }

    .canvas-stage {
      flex: 0 0 auto;
      min-height: auto;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    canvas {
      width: 100%;
      height: auto;
      max-height: 100%;
      aspect-ratio: 940 / 430;
      display: block;
      border: 1px solid #6d7d73;
      border-radius: 6px;
      box-shadow: 0 10px 24px rgba(41, 58, 49, 0.18);
      background: #ffffff;
    }

    .controls {
      margin-top: 2px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: stretch;
    }

    .controls-row {
      display: flex;
      flex-wrap: nowrap;
      gap: 8px;
      align-items: center;
      overflow-x: auto;
    }

    .controls-row-top {
      min-height: 0;
    }

    .controls-row-buttons {
      justify-content: flex-start;
    }

    .controls label {
      color: #203228;
      font-size: 0.95rem;
    }

    .controls button {
      border: 1px solid #42614f;
      background: #f0f8f3;
      color: #23392c;
      padding: 3px 7px;
      font-size: 0.78rem;
      border-radius: 6px;
      cursor: pointer;
    }

    .mode-btn.active {
      background: #2f4f3b;
      color: #ffffff;
      border-color: #1a2e22;
    }

    .toggle-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #203228;
      font-size: 0.85rem;
      white-space: nowrap;
      padding: 3px 2px;
    }

    .toggle-label input {
      margin: 0;
    }

    #simulation-container:fullscreen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      background-color: #f4f8f6;
    }

    #simulation-container:fullscreen canvas {
      width: min(95vw, 1200px);
      height: auto;
    }

    @media (max-width: 900px) {
      #simulation-container {
        height: auto;
        margin: 0 auto;
        padding: 4px;
      }

      .controls {
        gap: 5px;
      }

      .controls-row {
        flex-wrap: wrap;
        overflow-x: visible;
        gap: 6px;
      }

    }

    @media (max-width: 560px) {
      #simulation-container {
        height: auto;
        margin: 0 auto;
        padding: 2px;
      }

      .controls {
        margin-top: 2px;
      }

      .controls-row {
        gap: 5px;
      }

      .controls label {
        font-size: 0.82rem;
      }

      .controls button {
        padding: 2px 6px;
        font-size: 0.72rem;
      }

      .toggle-label {
        font-size: 0.74rem;
      }
    }
  </style>
</head>
<body>
  <div id="simulation-container">
    <div class="canvas-stage">
      <canvas id="simCanvas" width="940" height="430"></canvas>
    </div>
    <div class="controls">
      <div class="controls-row controls-row-top">
      </div>
      <div class="controls-row controls-row-buttons">
        <button id="btnManual"    type="button" class="mode-btn active">Manual</button>
        <button id="btnOscillate" type="button" class="mode-btn">Oscillate</button>
        <button id="btnFreeFall" type="button" class="mode-btn">Free Fall</button>
        <button id="btnPauseResume" type="button">Pause</button>
        <button id="fullscreenBtn" type="button">Fullscreen</button>
        <label class="toggle-label"><input type="checkbox" id="flipMagnet"> Flip Magnet Polarity</label>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    const flipMagnet = document.getElementById('flipMagnet');
    const btnPauseResume = document.getElementById('btnPauseResume');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const container = document.getElementById('simulation-container');

    const graphArea = {
      x: 450,
      y: 40,
      width: 340,
      height: 330,
      maxAbsVoltage: 7
    };

    // dataLog stores {t, v} entries; we keep a fixed time window of 2 oscillation periods.
    const dataLog = [];
    const GRAPH_WINDOW = 2 * 3.0; // seconds — updated dynamically in draw()
    let manualPosition = 95;
    let prevPosition = manualPosition;
    let prevTime = performance.now();
    let smoothedVelocity = 0;
    let isMoving = false;
    let isDraggingMagnet = false;
    let dragOffsetY = 0;

    // Animation modes: 'manual' | 'oscillate' | 'freefall'
    let animMode = 'manual';
    let animStartTime = null;   // for oscillate
    let fallVelocity = 0;       // px/s for freefall
    let fallPosition = 40;      // current y for freefall
    let freeFallActive = false;
    let analyticVelocity = null; // set by oscillate mode for clean EMF calc
    let isPaused = false;
    let pausedAtTime = 0;
    let pausedPosition = prevPosition;
    let pausedOscElapsed = 0;

    const MAGNET_HALF_HEIGHT = 42; // half of the 84px total magnet height
    const SLIDER_MIN = 40;
    const SLIDER_MAX = 320;
    const COIL_CENTER = 210;
    const COIL_X = 210;
    const MAGNET_X = 186;
    const COIL_TOP_Y = 156;
    const COIL_LOOPS = 7;
    const COIL_PITCH = 18;
    const COIL_RADIUS_X = 38;
    const COIL_RADIUS_Y = 7;
    const COIL_FRONT_ROTATION = 0.10;
    const COIL_FRONT_START_ANGLE = 0.02 * Math.PI;
    const COIL_BACK_ROTATION = -COIL_FRONT_ROTATION;
    const COIL_BACK_END_ANGLE = 2.02 * Math.PI;
    const OSC_AMPLITUDE = 90;   // px — passes well through the coil
    const OSC_PERIOD = 5.0;     // seconds per full oscillation
    const VOLTS_PER_PIXEL_PER_SECOND = 0.024;
    const GRAVITY = 260;        // px/s²
    const DROP_BUTTON = { x: 148, y: 46, w: 84, h: 34 };

    function setMode(mode) {
      animMode = mode;
      animStartTime = null;
      fallVelocity = 0;
      fallPosition = SLIDER_MIN;
      freeFallActive = false;
      isPaused = false;
      isDraggingMagnet = false;
      btnPauseResume.textContent = 'Pause';
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      const map = { manual: 'btnManual', oscillate: 'btnOscillate', freefall: 'btnFreeFall' };
      document.getElementById(map[mode]).classList.add('active');
    }

    document.getElementById('btnManual').addEventListener('click',    () => setMode('manual'));
    document.getElementById('btnOscillate').addEventListener('click', () => setMode('oscillate'));
    document.getElementById('btnFreeFall').addEventListener('click',  () => setMode('freefall'));

    btnPauseResume.addEventListener('click', () => {
      if (!isPaused) {
        isPaused = true;
        pausedAtTime = performance.now();
        pausedPosition = prevPosition;
        if (animMode === 'oscillate' && animStartTime !== null) {
          pausedOscElapsed = (performance.now() - animStartTime) / 1000;
        }
        btnPauseResume.textContent = 'Resume';
        return;
      }

      const now = performance.now();
      const pauseDurationSec = (now - pausedAtTime) / 1000;
      for (const point of dataLog) {
        point.t += pauseDurationSec;
      }
      if (animMode === 'oscillate') {
        animStartTime = now - pausedOscElapsed * 1000;
      }
      prevPosition = pausedPosition;
      prevTime = now;
      isPaused = false;
      btnPauseResume.textContent = 'Pause';
    });

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function getCanvasPoint(event) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      return {
        x: (event.clientX - rect.left) * scaleX,
        y: (event.clientY - rect.top) * scaleY
      };
    }

    function isPointInMagnet(x, y) {
      return x >= MAGNET_X
        && x <= MAGNET_X + 48
        && y >= manualPosition
        && y <= manualPosition + MAGNET_HALF_HEIGHT * 2;
    }

    canvas.addEventListener('pointerdown', (event) => {
      if (animMode !== 'manual' || isPaused) return;

      const point = getCanvasPoint(event);
      if (!isPointInMagnet(point.x, point.y)) return;

      isDraggingMagnet = true;
      dragOffsetY = point.y - manualPosition;
      isMoving = true;
      canvas.setPointerCapture(event.pointerId);
    });

    canvas.addEventListener('pointermove', (event) => {
      if (!isDraggingMagnet || animMode !== 'manual' || isPaused) return;

      const point = getCanvasPoint(event);
      manualPosition = clamp(Math.round(point.y - dragOffsetY), SLIDER_MIN, SLIDER_MAX);
      isMoving = true;
    });

    function stopMagnetDrag(event) {
      if (!isDraggingMagnet) return;

      isDraggingMagnet = false;
      isMoving = false;
      if (event && canvas.hasPointerCapture(event.pointerId)) {
        canvas.releasePointerCapture(event.pointerId);
      }
    }

    canvas.addEventListener('pointerup', stopMagnetDrag);
    canvas.addEventListener('pointercancel', stopMagnetDrag);

    function drawDropButton() {
      if (animMode !== 'freefall' || freeFallActive) return;

      ctx.save();
      ctx.fillStyle = '#2f4f3b';
      ctx.strokeStyle = '#1b2f22';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.roundRect(DROP_BUTTON.x, DROP_BUTTON.y, DROP_BUTTON.w, DROP_BUTTON.h, 8);
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 16px Trebuchet MS';
      ctx.fillText('Drop', DROP_BUTTON.x + 24, DROP_BUTTON.y + 22);
      ctx.restore();
    }

    canvas.addEventListener('click', (event) => {
      if (animMode !== 'freefall' || freeFallActive || isPaused) return;

      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const x = (event.clientX - rect.left) * scaleX;
      const y = (event.clientY - rect.top) * scaleY;

      const inside = x >= DROP_BUTTON.x && x <= DROP_BUTTON.x + DROP_BUTTON.w
        && y >= DROP_BUTTON.y && y <= DROP_BUTTON.y + DROP_BUTTON.h;

      if (inside) {
        freeFallActive = true;
        fallPosition = SLIDER_MIN;
        fallVelocity = 0;
        prevPosition = SLIDER_MIN;
      }
    });

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        container.requestFullscreen().catch((err) => {
          alert(`Error attempting to enable fullscreen: ${err.message}`);
        });
      } else {
        document.exitFullscreen();
      }
    }

    function drawMagnet(y, flipped) {
      const x = MAGNET_X;
      const magnetWidth = 48;
      const sectionHeight = 42;

      ctx.font = 'bold 20px Trebuchet MS';

      if (!flipped) {
        ctx.fillStyle = 'blue';
        ctx.fillRect(x, y, magnetWidth, sectionHeight);
        ctx.fillStyle = 'white';
        ctx.fillText('S', x + 20, y + 27);

        ctx.fillStyle = 'red';
        ctx.fillRect(x, y + sectionHeight, magnetWidth, sectionHeight);
        ctx.fillStyle = 'white';
        ctx.fillText('N', x + 19, y + sectionHeight + 27);
      } else {
        ctx.fillStyle = 'red';
        ctx.fillRect(x, y, magnetWidth, sectionHeight);
        ctx.fillStyle = 'white';
        ctx.fillText('N', x + 19, y + 27);

        ctx.fillStyle = 'blue';
        ctx.fillRect(x, y + sectionHeight, magnetWidth, sectionHeight);
        ctx.fillStyle = 'white';
        ctx.fillText('S', x + 20, y + sectionHeight + 27);
      }

      ctx.fillStyle = '#25352b';
      ctx.font = '16px Trebuchet MS';
      ctx.fillText('Magnet', x - 3, y - 8);
    }

    function drawDataloggerConnections(currentSign = 0) {
      const terminalX = graphArea.x - 10;
      const terminalTopY = graphArea.y + 92;
      const terminalBottomY = graphArea.y + graphArea.height - 92;

      function ellipsePoint(cx, cy, rx, ry, theta, rot) {
        const cosT = Math.cos(theta);
        const sinT = Math.sin(theta);
        const cosR = Math.cos(rot);
        const sinR = Math.sin(rot);
        return {
          x: cx + rx * cosT * cosR - ry * sinT * sinR,
          y: cy + rx * cosT * sinR + ry * sinT * cosR
        };
      }

      const frontYOffset = COIL_PITCH / 2;
      const topFrontLoopY = COIL_TOP_Y + frontYOffset;
      const bottomFrontLoopY = COIL_TOP_Y + (COIL_LOOPS - 1) * COIL_PITCH + frontYOffset;
      const topStart = ellipsePoint(
        COIL_X,
        topFrontLoopY,
        COIL_RADIUS_X,
        COIL_RADIUS_Y,
        COIL_BACK_END_ANGLE,
        COIL_BACK_ROTATION
      );
      topStart.y -= 10;
      const bottomStart = ellipsePoint(
        COIL_X,
        bottomFrontLoopY,
        COIL_RADIUS_X,
        COIL_RADIUS_Y,
        COIL_FRONT_START_ANGLE,
        COIL_FRONT_ROTATION
      );

      const topC1 = { x: topStart.x + 54, y: topStart.y - 10 };
      const topC2 = { x: terminalX - 42, y: terminalTopY - 10 };
      const topEnd = { x: terminalX, y: terminalTopY };
      const bottomC1 = { x: bottomStart.x + 54, y: bottomStart.y + 10 };
      const bottomC2 = { x: terminalX - 42, y: terminalBottomY + 10 };
      const bottomEnd = { x: terminalX, y: terminalBottomY };

      // Wires from solenoid to datalogger terminal pair.
      ctx.strokeStyle = '#2f3d36';
      ctx.lineWidth = 3.8;
      ctx.lineCap = 'round';

      ctx.beginPath();
      ctx.moveTo(topStart.x, topStart.y);
      ctx.bezierCurveTo(topC1.x, topC1.y, topC2.x, topC2.y, topEnd.x, topEnd.y);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(bottomStart.x, bottomStart.y);
      ctx.bezierCurveTo(bottomC1.x, bottomC1.y, bottomC2.x, bottomC2.y, bottomEnd.x, bottomEnd.y);
      ctx.stroke();

      function cubicPoint(p0, p1, p2, p3, t) {
        const u = 1 - t;
        const tt = t * t;
        const uu = u * u;
        const uuu = uu * u;
        const ttt = tt * t;
        return {
          x: uuu * p0.x + 3 * uu * t * p1.x + 3 * u * tt * p2.x + ttt * p3.x,
          y: uuu * p0.y + 3 * uu * t * p1.y + 3 * u * tt * p2.y + ttt * p3.y
        };
      }

      function cubicTangent(p0, p1, p2, p3, t) {
        const u = 1 - t;
        return {
          x: 3 * u * u * (p1.x - p0.x) + 6 * u * t * (p2.x - p1.x) + 3 * t * t * (p3.x - p2.x),
          y: 3 * u * u * (p1.y - p0.y) + 6 * u * t * (p2.y - p1.y) + 3 * t * t * (p3.y - p2.y)
        };
      }

      function drawArrowOnBezier(p0, p1, p2, p3, t, reverse) {
        const p = cubicPoint(p0, p1, p2, p3, t);
        const tan = cubicTangent(p0, p1, p2, p3, t);
        let angle = Math.atan2(tan.y, tan.x);
        if (reverse) angle += Math.PI;

        const len = 17;
        const wing = 7.2;
        ctx.strokeStyle = '#183227';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(p.x - len * Math.cos(angle), p.y - len * Math.sin(angle));
        ctx.lineTo(p.x, p.y);
        ctx.lineTo(
          p.x - wing * Math.cos(angle - Math.PI / 4),
          p.y - wing * Math.sin(angle - Math.PI / 4)
        );
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(
          p.x - wing * Math.cos(angle + Math.PI / 4),
          p.y - wing * Math.sin(angle + Math.PI / 4)
        );
        ctx.stroke();
      }

      if (Math.abs(currentSign) > 1e-5) {
        const positive = currentSign > 0;
        // Positive current: top wire coil -> logger, bottom wire logger -> coil.
        drawArrowOnBezier(topStart, topC1, topC2, topEnd, 0.56, !positive);
        drawArrowOnBezier(bottomStart, bottomC1, bottomC2, bottomEnd, 0.56, positive);
      }

      // Simulated datalogger terminals.
      ctx.fillStyle = '#dce9e1';
      ctx.strokeStyle = '#2f4f3b';
      ctx.lineWidth = 2;

      ctx.beginPath();
      ctx.arc(terminalX, terminalTopY, 7, 0, 2 * Math.PI);
      ctx.fill();
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(terminalX, terminalBottomY, 7, 0, 2 * Math.PI);
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = '#1f3025';
      ctx.font = 'bold 13px Trebuchet MS';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('+', terminalX, terminalTopY + 0.5);
      ctx.fillText('-', terminalX, terminalBottomY + 0.5);

      // Reset text alignment so other labels render as expected.
      ctx.textAlign = 'start';
      ctx.textBaseline = 'alphabetic';
    }

    function drawCoilLayer(frontLayer) {
      const centerX = COIL_X;
      const topY = COIL_TOP_Y;
      const loops = COIL_LOOPS;
      const pitch = COIL_PITCH;
      const radiusX = COIL_RADIUS_X;
      const radiusY = COIL_RADIUS_Y;
      const rotation = frontLayer ? COIL_FRONT_ROTATION : COIL_BACK_ROTATION;
      const startAngle = frontLayer ? COIL_FRONT_START_ANGLE : 1.02 * Math.PI;
      const endAngle = frontLayer ? 1.02 * Math.PI : 2.02 * Math.PI;

      function ellipsePoint(cx, cy, rx, ry, theta, rot) {
        const cosT = Math.cos(theta);
        const sinT = Math.sin(theta);
        const cosR = Math.cos(rot);
        const sinR = Math.sin(rot);
        return {
          x: cx + rx * cosT * cosR - ry * sinT * sinR,
          y: cy + rx * cosT * sinR + ry * sinT * cosR
        };
      }

      // Front arcs are offset by half a pitch so they sit between the back arcs,
      // making the two half-ellipses join into one continuous helical spiral.
      const yOffset = frontLayer ? pitch / 2 : 0;
      for (let i = 0; i < loops; i++) {
        const loopY = topY + i * pitch + yOffset;

        ctx.strokeStyle = frontLayer ? '#4f5f57' : '#9fa9a3';
        ctx.lineWidth = frontLayer ? 4 : 3;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.ellipse(centerX, loopY, radiusX, radiusY, rotation, startAngle, endAngle);
        ctx.stroke();

        if (frontLayer) {
          ctx.strokeStyle = '#b9c8c0';
          ctx.lineWidth = 1.2;
          ctx.beginPath();
          ctx.ellipse(centerX - 1, loopY - 0.6, radiusX - 1, radiusY - 0.8, rotation, startAngle, endAngle);
          ctx.stroke();
        }


      }

      const bottomY = topY + (loops - 1) * pitch + yOffset;

      if (frontLayer) {
        ctx.fillStyle = '#25352b';
        ctx.font = '16px Trebuchet MS';
        ctx.fillText('Solenoid', centerX + radiusX + 12, topY + 10);
      }
    }

    function drawGraphBackground() {
      ctx.fillStyle = '#f4fff8';
      ctx.fillRect(graphArea.x, graphArea.y, graphArea.width, graphArea.height);

      ctx.strokeStyle = '#2f4f3b';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(graphArea.x, graphArea.y, graphArea.width, graphArea.height);

      ctx.fillStyle = '#1f3025';
      ctx.font = '15px Trebuchet MS';
      ctx.fillText('Data Logger: EMF (V)', graphArea.x + 10, graphArea.y - 12);

      const rows = 6;
      ctx.strokeStyle = '#b9d1c2';
      ctx.lineWidth = 1;
      for (let i = 1; i < rows; i++) {
        const y = graphArea.y + (graphArea.height / rows) * i;
        ctx.beginPath();
        ctx.moveTo(graphArea.x, y);
        ctx.lineTo(graphArea.x + graphArea.width, y);
        ctx.stroke();
      }

      const zeroY = graphArea.y + graphArea.height / 2;
      ctx.strokeStyle = '#4a6757';
      ctx.beginPath();
      ctx.moveTo(graphArea.x, zeroY);
      ctx.lineTo(graphArea.x + graphArea.width, zeroY);
      ctx.stroke();

      ctx.fillStyle = '#2f4f3b';
      ctx.font = '14px Trebuchet MS';
      ctx.fillText('+V', graphArea.x + 8, graphArea.y + 14);
      ctx.fillText('-V', graphArea.x + 8, graphArea.y + graphArea.height - 6);
    }

    function drawGraphTrace() {
      if (dataLog.length < 2) return;

      // Use 2 cycles for oscillate, 10 s window otherwise
      const window = (animMode === 'oscillate') ? 2 * OSC_PERIOD : 10;
      const tNow = dataLog[dataLog.length - 1].t;
      const tMin = tNow - window;

      // Filter to entries within the window
      const visible = dataLog.filter(d => d.t >= tMin);
      if (visible.length < 2) return;

      ctx.strokeStyle = '#136f3a';
      ctx.lineWidth = 2;
      ctx.beginPath();

      for (let i = 0; i < visible.length; i++) {
        const x = graphArea.x + ((visible[i].t - tMin) / window) * graphArea.width;
        const normalized = Math.max(Math.min(visible[i].v / graphArea.maxAbsVoltage, 1), -1);
        const y = graphArea.y + graphArea.height / 2 - normalized * (graphArea.height * 0.45);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();

      const latest = dataLog[dataLog.length - 1].v;
      ctx.fillStyle = '#183827';
      ctx.font = '15px Trebuchet MS';
      ctx.fillText(`Reading: ${latest.toFixed(2)} V`, graphArea.x + 10, graphArea.y + graphArea.height + 24);
    }

    function drawAppLabel() {
      ctx.fillStyle = '#2a3a31';
      ctx.font = '14px Trebuchet MS';
      ctx.fillText('Electromagnetic Induction Experiment', 14, 22);
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const currentTime = performance.now();
      const dt = Math.min((currentTime - prevTime) / 1000, 0.05); // cap dt to avoid jumps

      if (isPaused) {
        drawCoilLayer(false);
        drawMagnet(pausedPosition, flipMagnet.checked);
        drawCoilLayer(true);
        drawAppLabel();
        const lastVoltage = dataLog.length ? dataLog[dataLog.length - 1].v : 0;
        drawDataloggerConnections(lastVoltage);
        drawDropButton();
        drawGraphBackground();
        drawGraphTrace();
        requestAnimationFrame(draw);
        return;
      }

      let position;

      if (animMode === 'oscillate') {
        if (animStartTime === null) animStartTime = currentTime;
        const t = (currentTime - animStartTime) / 1000;
        const omega = 2 * Math.PI / OSC_PERIOD;
        position = Math.round((COIL_CENTER - MAGNET_HALF_HEIGHT) + OSC_AMPLITUDE * Math.sin(omega * t));
        analyticVelocity = OSC_AMPLITUDE * omega * Math.cos(omega * t);
        isMoving = true;
      } else if (animMode === 'freefall') {
        if (!freeFallActive) {
          position = SLIDER_MIN;
          analyticVelocity = 0;
          isMoving = false;
        } else {
          if (animStartTime === null) animStartTime = currentTime;
          fallVelocity += GRAVITY * dt;
          fallPosition += fallVelocity * dt;
          if (fallPosition > SLIDER_MAX + 100) {
            freeFallActive = false;
            fallPosition = SLIDER_MIN;
            fallVelocity = 0;
            animStartTime = currentTime;
            position = SLIDER_MIN;
            analyticVelocity = 0;
            isMoving = false;
          } else {
            position = Math.round(fallPosition);
            analyticVelocity = null;
            isMoving = true;
          }
        }
      } else {
        position = manualPosition;
        analyticVelocity = null;
      }

      drawCoilLayer(false);
      drawMagnet(position, flipMagnet.checked);
      drawCoilLayer(true);
      drawAppLabel();
      drawDropButton();

      const rawVelocity = dt > 0 ? (position - prevPosition) / dt : 0;
      const adjustedVelocity = flipMagnet.checked ? -rawVelocity : rawVelocity;

      const alpha = 0.2;
      smoothedVelocity = alpha * adjustedVelocity + (1 - alpha) * smoothedVelocity;

      // Use analytic velocity for oscillate mode; smoothed frame-diff otherwise
      const effectiveVelocity = analyticVelocity !== null
        ? (flipMagnet.checked ? -analyticVelocity : analyticVelocity)
        : smoothedVelocity;

      // For oscillate mode, use an ideal sinusoid for a clean datalogger trace.
      // Keep the physics-shaped emf model for manual and free-fall motion.
      let voltage;
      if (animMode === 'oscillate' && animStartTime !== null) {
        const t = (currentTime - animStartTime) / 1000;
        const omega = 2 * Math.PI / OSC_PERIOD;
        const sign = flipMagnet.checked ? -1 : 1;
        const peakVelocity = OSC_AMPLITUDE * omega;
        const peakVoltage = peakVelocity * VOLTS_PER_PIXEL_PER_SECOND;
        voltage = sign * peakVoltage * Math.sin(2 * omega * t);
      } else {
        const sigma = 70;
        const distance = (position + MAGNET_HALF_HEIGHT) - COIL_CENTER;
        const flux = Math.exp(-(distance * distance) / (2 * sigma * sigma));
        voltage = (effectiveVelocity / 80) * (distance / sigma) * flux;
      }

      drawDataloggerConnections(voltage);

      dataLog.push({ t: currentTime / 1000, v: voltage });
      // Keep only the last 20 seconds of data to limit memory
      const cutoff = currentTime / 1000 - 20;
      while (dataLog.length > 1 && dataLog[0].t < cutoff) dataLog.shift();

      if (!isMoving) {
        smoothedVelocity *= 0.9;
        if (Math.abs(smoothedVelocity) < 0.01) smoothedVelocity = 0;
      }

      drawGraphBackground();
      drawGraphTrace();

      prevPosition = position;
      prevTime = currentTime;
      requestAnimationFrame(draw);
    }
    fullscreenBtn.addEventListener('click', toggleFullscreen);
    requestAnimationFrame(draw);
  </script>
</body>
</html>
