<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Face Welcome App</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Fraunces:opsz,wght@9..144,700&display=swap" rel="stylesheet" />
	<style>
		:root {
			--bg-top: #0f172a;
			--bg-mid: #12263a;
			--bg-bot: #083344;
			--surface: rgba(255, 255, 255, 0.1);
			--surface-strong: rgba(255, 255, 255, 0.16);
			--text: #e2e8f0;
			--muted: #a7b8ca;
			--accent: #34d399;
			--accent-2: #f59e0b;
			--danger: #f87171;
			--ring: rgba(52, 211, 153, 0.4);
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100svh;
			font-family: "Manrope", sans-serif;
			color: var(--text);
			background:
				radial-gradient(circle at 20% 20%, rgba(52, 211, 153, 0.18), transparent 40%),
				radial-gradient(circle at 80% 10%, rgba(245, 158, 11, 0.16), transparent 34%),
				linear-gradient(160deg, var(--bg-top), var(--bg-mid) 50%, var(--bg-bot));
			display: grid;
			place-items: center;
			padding: 24px;
		}

		.app {
			width: min(1050px, 100%);
			display: grid;
			gap: 18px;
			animation: rise-in 700ms ease;
		}

		.title-wrap {
			background: linear-gradient(120deg, rgba(15, 23, 42, 0.55), rgba(8, 51, 68, 0.35));
			border: 1px solid rgba(255, 255, 255, 0.18);
			border-radius: 20px;
			padding: 18px 22px;
			backdrop-filter: blur(8px);
			box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
		}

		h1 {
			margin: 0;
			font-family: "Fraunces", serif;
			font-size: clamp(1.8rem, 3.5vw, 2.8rem);
			line-height: 1.1;
			letter-spacing: 0.4px;
		}

		.subtitle {
			margin-top: 8px;
			color: var(--muted);
			font-size: 0.97rem;
		}

		.grid {
			display: grid;
			grid-template-columns: 1.4fr 1fr;
			gap: 18px;
		}

		.card {
			background: var(--surface);
			border: 1px solid rgba(255, 255, 255, 0.2);
			border-radius: 20px;
			backdrop-filter: blur(10px);
			box-shadow: 0 14px 34px rgba(0, 0, 0, 0.28);
			overflow: hidden;
		}

		.video-wrap {
			position: relative;
			aspect-ratio: 16 / 10;
			background: #0b1120;
		}

		video, canvas {
			position: absolute;
			inset: 0;
			width: 100%;
			height: 100%;
			object-fit: cover;
			transform: scaleX(-1);
		}

		.badge {
			position: absolute;
			top: 14px;
			left: 14px;
			z-index: 2;
			background: rgba(8, 51, 68, 0.75);
			border: 1px solid rgba(255, 255, 255, 0.25);
			border-radius: 999px;
			padding: 6px 12px;
			font-size: 0.83rem;
			letter-spacing: 0.2px;
			backdrop-filter: blur(6px);
		}

		.controls {
			padding: 16px;
			display: grid;
			gap: 12px;
		}

		.row {
			display: flex;
			gap: 10px;
			flex-wrap: wrap;
		}

		input {
			flex: 1;
			min-width: 170px;
			border-radius: 12px;
			border: 1px solid rgba(255, 255, 255, 0.24);
			background: rgba(2, 6, 23, 0.45);
			color: var(--text);
			padding: 11px 12px;
			font-size: 0.95rem;
			outline: none;
			transition: box-shadow 180ms ease, border-color 180ms ease;
		}

		input:focus {
			border-color: var(--accent);
			box-shadow: 0 0 0 4px var(--ring);
		}

		button {
			border: 0;
			border-radius: 12px;
			padding: 11px 14px;
			font-weight: 700;
			font-size: 0.92rem;
			cursor: pointer;
			transition: transform 150ms ease, filter 150ms ease;
		}

		button:hover {
			transform: translateY(-1px);
			filter: brightness(1.08);
		}

		.btn-primary {
			background: linear-gradient(120deg, var(--accent), #10b981);
			color: #03261f;
		}

		.btn-secondary {
			background: linear-gradient(120deg, #38bdf8, #0ea5e9);
			color: #082f49;
		}

		.btn-danger {
			background: linear-gradient(120deg, #f97316, #ef4444);
			color: #2b0b0b;
		}

		.status {
			font-size: 0.95rem;
			color: var(--muted);
			min-height: 24px;
		}

		.greeting {
			margin: 0;
			font-size: clamp(1.05rem, 2.2vw, 1.45rem);
			font-weight: 800;
			color: #d1fae5;
			opacity: 0;
			transform: translateY(6px);
			transition: opacity 300ms ease, transform 300ms ease;
			text-shadow: 0 0 24px rgba(52, 211, 153, 0.35);
		}

		.greeting.show {
			opacity: 1;
			transform: translateY(0);
		}

		.list {
			padding: 16px;
			display: grid;
			gap: 9px;
			align-content: start;
		}

		.list h2 {
			margin: 0;
			font-size: 1.02rem;
			letter-spacing: 0.3px;
		}

		.person {
			background: var(--surface-strong);
			border: 1px solid rgba(255, 255, 255, 0.2);
			border-radius: 11px;
			padding: 9px 11px;
			font-size: 0.93rem;
		}

		.hint {
			color: #bae6fd;
			font-size: 0.87rem;
			line-height: 1.35;
		}

		@keyframes rise-in {
			from {
				opacity: 0;
				transform: translateY(10px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		@media (max-width: 900px) {
			.grid {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>
<body>
	<main class="app">
		<section class="title-wrap">
			<h1>Face Welcome</h1>
			<div class="subtitle">Register a face once, and get a personalized greeting the next time that face appears.</div>
		</section>

		<section class="grid">
			<article class="card">
				<div class="video-wrap">
					<div class="badge" id="detectionBadge">Camera: Starting...</div>
					<video id="webcam" autoplay playsinline muted></video>
					<canvas id="overlay"></canvas>
				</div>
				<div class="controls">
					<div class="row">
						<input id="nameInput" type="text" placeholder="Enter a name to register" maxlength="40" />
						<button class="btn-primary" id="registerBtn" type="button">Register Face</button>
					</div>
					<div class="row">
						<button class="btn-secondary" id="startBtn" type="button">Start Camera</button>
						<button class="btn-secondary" id="openStandaloneBtn" type="button" hidden>Open Standalone</button>
						<button class="btn-danger" id="clearBtn" type="button">Clear Registry</button>
					</div>
					<div class="status" id="status">Loading MediaPipe model...</div>
					<p class="greeting" id="greeting"></p>
				</div>
			</article>

			<aside class="card list">
				<h2>Registered People</h2>
				<div id="peopleList"></div>
				<div class="hint">Tip: keep your face centered and hold still while registration is collecting samples.</div>
			</aside>
		</section>
	</main>

	<script type="module">
		import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

		const STORAGE_KEY = "mediapipe-face-registry-v1";
		const SAMPLE_TARGET = 12;
		const RECOGNITION_THRESHOLD = 0.68;
		const GREETING_COOLDOWN_MS = 9000;

		const FEATURE_POINTS = [
			1, 4, 6, 8, 9, 10, 13, 14, 17, 33, 46, 52, 55, 61,
			70, 78, 82, 87, 91, 95, 105, 107, 127, 132, 133, 145,
			146, 152, 159, 160, 161, 162, 172, 181, 185, 191, 199,
			205, 234, 246, 249, 263, 267, 270, 276, 282, 291, 295,
			296, 300, 308, 311, 312, 314, 318, 323, 334, 336, 356,
			361, 362, 374, 375, 386, 387, 388, 389, 397, 398, 402
		];

		const webcam = document.getElementById("webcam");
		const overlay = document.getElementById("overlay");
		const ctx = overlay.getContext("2d");

		const statusEl = document.getElementById("status");
		const detectionBadgeEl = document.getElementById("detectionBadge");
		const greetingEl = document.getElementById("greeting");
		const nameInput = document.getElementById("nameInput");
		const registerBtn = document.getElementById("registerBtn");
		const startBtn = document.getElementById("startBtn");
		const openStandaloneBtn = document.getElementById("openStandaloneBtn");
		const clearBtn = document.getElementById("clearBtn");
		const peopleListEl = document.getElementById("peopleList");
		const isEmbedded = window.self !== window.top;

		let faceLandmarker;
		let cameraRunning = false;
		let lastVideoTime = -1;
		let currentDescriptor = null;
		let currentIdentity = null;
		let registrationJob = null;
		const greetedAt = new Map();

		let registry = loadRegistry();
		renderRegistry();

		if (isEmbedded) {
			openStandaloneBtn.hidden = false;
			statusEl.textContent = "Embedded mode detected. If camera is blocked, use Open Standalone.";
		}

		const clamp = (value, min, max) => Math.max(min, Math.min(max, value));

		async function initModel() {
			statusEl.textContent = "Initializing MediaPipe...";
			const vision = await FilesetResolver.forVisionTasks(
				"https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
			);

			faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
				baseOptions: {
					modelAssetPath:
						"https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task"
				},
				runningMode: "VIDEO",
				numFaces: 1,
				minFaceDetectionConfidence: 0.5,
				minFacePresenceConfidence: 0.5,
				minTrackingConfidence: 0.5
			});

			statusEl.textContent = "Model loaded. Click Start Camera.";
			detectionBadgeEl.textContent = "Camera: Ready";
		}

		async function startCamera() {
			if (cameraRunning) {
				return;
			}

			if (!faceLandmarker) {
				await initModel();
			}

			try {
				const stream = await navigator.mediaDevices.getUserMedia({
					video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" },
					audio: false
				});
				webcam.srcObject = stream;
				await webcam.play();

				resizeOverlay();
				window.addEventListener("resize", resizeOverlay);
				cameraRunning = true;
				statusEl.textContent = "Camera running. Look at the camera to be recognized.";
				detectionBadgeEl.textContent = "Camera: Live";
				requestAnimationFrame(predictLoop);
			} catch (error) {
				statusEl.textContent = isEmbedded
					? "Camera blocked in embedded mode. Click Open Standalone."
					: "Camera permission denied or unavailable.";
				detectionBadgeEl.textContent = "Camera: Error";
				console.error(error);
			}
		}

		function resizeOverlay() {
			const rect = webcam.getBoundingClientRect();
			overlay.width = Math.floor(rect.width);
			overlay.height = Math.floor(rect.height);
		}

		function predictLoop() {
			if (!cameraRunning || !faceLandmarker) {
				return;
			}

			if (webcam.currentTime !== lastVideoTime) {
				lastVideoTime = webcam.currentTime;
				const result = faceLandmarker.detectForVideo(webcam, performance.now());
				processResult(result);
			}

			requestAnimationFrame(predictLoop);
		}

		function processResult(result) {
			ctx.clearRect(0, 0, overlay.width, overlay.height);
			const landmarks = result.faceLandmarks?.[0];

			if (!landmarks) {
				currentDescriptor = null;
				currentIdentity = null;
				detectionBadgeEl.textContent = "No face detected";
				if (registrationJob) {
					statusEl.textContent = "Waiting for a clear face to continue registration...";
				}
				return;
			}

			drawLandmarkHighlights(landmarks);
			currentDescriptor = buildFaceDescriptor(landmarks);
			currentIdentity = recognize(currentDescriptor);

			if (registrationJob) {
				registrationJob.samples.push(currentDescriptor);
				const left = SAMPLE_TARGET - registrationJob.samples.length;
				if (left > 0) {
					statusEl.textContent = `Registering ${registrationJob.name}... ${left} sample(s) left.`;
				} else {
					const averaged = averageDescriptors(registrationJob.samples);
					upsertPerson(registrationJob.name, averaged);
					statusEl.textContent = `Registered ${registrationJob.name} successfully.`;
					registrationJob = null;
					renderRegistry();
				}
			}

			if (currentIdentity) {
				detectionBadgeEl.textContent = `Recognized: ${currentIdentity.name}`;
				maybeShowGreeting(currentIdentity.name);
			} else {
				detectionBadgeEl.textContent = "Unknown face";
			}
		}

		function drawLandmarkHighlights(landmarks) {
			ctx.save();
			ctx.fillStyle = "rgba(52, 211, 153, 0.75)";
			for (let i = 0; i < FEATURE_POINTS.length; i += 3) {
				const point = landmarks[FEATURE_POINTS[i]];
				if (!point) {
					continue;
				}
				const x = (1 - point.x) * overlay.width;
				const y = point.y * overlay.height;
				ctx.beginPath();
				ctx.arc(x, y, 2, 0, Math.PI * 2);
				ctx.fill();
			}
			ctx.restore();
		}

		function buildFaceDescriptor(landmarks) {
			const leftEye = landmarks[33];
			const rightEye = landmarks[263];
			const nose = landmarks[1];

			const eyeDx = leftEye.x - rightEye.x;
			const eyeDy = leftEye.y - rightEye.y;
			const eyeDist = Math.hypot(eyeDx, eyeDy) || 1e-6;

			const descriptor = [];
			for (const idx of FEATURE_POINTS) {
				const p = landmarks[idx];
				descriptor.push(clamp((p.x - nose.x) / eyeDist, -3, 3));
				descriptor.push(clamp((p.y - nose.y) / eyeDist, -3, 3));
				descriptor.push(clamp((p.z - nose.z) / eyeDist, -3, 3));
			}
			return descriptor;
		}

		function averageDescriptors(samples) {
			const out = new Array(samples[0].length).fill(0);
			for (const sample of samples) {
				for (let i = 0; i < sample.length; i++) {
					out[i] += sample[i];
				}
			}
			for (let i = 0; i < out.length; i++) {
				out[i] /= samples.length;
			}
			return out;
		}

		function recognize(descriptor) {
			if (!descriptor || registry.length === 0) {
				return null;
			}

			let best = null;
			for (const person of registry) {
				const distance = descriptorDistance(descriptor, person.descriptor);
				if (!best || distance < best.distance) {
					best = { name: person.name, distance };
				}
			}

			if (best && best.distance <= RECOGNITION_THRESHOLD) {
				return best;
			}
			return null;
		}

		function descriptorDistance(a, b) {
			let sum = 0;
			for (let i = 0; i < a.length; i++) {
				const d = a[i] - b[i];
				sum += d * d;
			}
			return Math.sqrt(sum / a.length);
		}

		function maybeShowGreeting(name) {
			const now = Date.now();
			const last = greetedAt.get(name) || 0;
			if (now - last < GREETING_COOLDOWN_MS) {
				return;
			}

			greetedAt.set(name, now);
			greetingEl.textContent = `Welcome back, ${name}!`;
			greetingEl.classList.add("show");

			clearTimeout(maybeShowGreeting._timer);
			maybeShowGreeting._timer = setTimeout(() => {
				greetingEl.classList.remove("show");
			}, 3400);
		}

		function upsertPerson(name, descriptor) {
			const normalized = name.trim();
			const idx = registry.findIndex(
				(person) => person.name.toLowerCase() === normalized.toLowerCase()
			);

			if (idx >= 0) {
				registry[idx] = { name: normalized, descriptor };
			} else {
				registry.push({ name: normalized, descriptor });
			}
			saveRegistry();
		}

		function renderRegistry() {
			if (registry.length === 0) {
				peopleListEl.innerHTML = "<div class='person'>No one registered yet.</div>";
				return;
			}

			peopleListEl.innerHTML = registry
				.map((person) => `<div class='person'>${escapeHtml(person.name)}</div>`)
				.join("");
		}

		function loadRegistry() {
			try {
				const raw = localStorage.getItem(STORAGE_KEY);
				if (!raw) {
					return [];
				}
				const parsed = JSON.parse(raw);
				if (!Array.isArray(parsed)) {
					return [];
				}
				return parsed.filter(
					(item) =>
						item &&
						typeof item.name === "string" &&
						Array.isArray(item.descriptor) &&
						item.descriptor.length > 10
				);
			} catch {
				return [];
			}
		}

		function saveRegistry() {
			localStorage.setItem(STORAGE_KEY, JSON.stringify(registry));
		}

		function escapeHtml(text) {
			return text
				.replaceAll("&", "&amp;")
				.replaceAll("<", "&lt;")
				.replaceAll(">", "&gt;")
				.replaceAll('"', "&quot;")
				.replaceAll("'", "&#39;");
		}

		registerBtn.addEventListener("click", () => {
			const name = nameInput.value.trim();
			if (!name) {
				statusEl.textContent = "Enter a name before registering.";
				return;
			}

			if (!cameraRunning) {
				statusEl.textContent = "Start the camera first.";
				return;
			}

			registrationJob = { name, samples: [] };
			statusEl.textContent = `Registration started for ${name}. Please hold still.`;
		});

		startBtn.addEventListener("click", async () => {
			await startCamera();
		});

		openStandaloneBtn.addEventListener("click", () => {
			window.open(window.location.href, "_blank", "noopener,noreferrer");
		});

		clearBtn.addEventListener("click", () => {
			registry = [];
			saveRegistry();
			renderRegistry();
			greetedAt.clear();
			statusEl.textContent = "Registry cleared.";
			detectionBadgeEl.textContent = "Camera: Live";
		});

		initModel().catch((error) => {
			console.error(error);
			statusEl.textContent = "Failed to load MediaPipe model.";
			detectionBadgeEl.textContent = "Model: Error";
		});
	</script>
</body>
</html>
