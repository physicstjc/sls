<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2D Topple Simulation</title>
  <meta name="description" content="Interactive Topple Test simulation to explore stability, center of gravity, and toppling behavior.">
  <link rel="canonical" href="https://physicstjc.github.io/sls/cg/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Topple Test Simulation">
  <meta property="og:description" content="Interactive Topple Test simulation to explore stability, center of gravity, and toppling behavior.">
  <meta property="og:url" content="https://physicstjc.github.io/sls/cg/">
  <meta property="og:image" content="https://physicstjc.github.io/sls/cg/cg.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="800">
  <meta property="og:image:alt" content="Preview image of the Topple Test simulation">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Topple Test Simulation">
  <meta name="twitter:description" content="Interactive Topple Test simulation to explore stability, center of gravity, and toppling behavior.">
  <meta name="twitter:image" content="https://physicstjc.github.io/sls/cg/cg.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="container">
    <div id="simFrame">
      <div id="topTitleBar">
        <h1>Topple Test</h1>
      </div>
      <canvas id="simCanvas" width="840" height="460"></canvas>
      <div id="sidebar">
        <div id="instructions">
          <p><strong>Drag corners</strong> to reshape</p>
          <p><strong>Drag object</strong> to push</p>
          <p>Object rotates about floor corner</p>
        </div>
        <div id="cogDisplay">CoG: (0.0, 0.0)</div>
        <div id="statusDisplay">Ready</div>
        <label id="forcesLabel">
          <input type="checkbox" id="showForces"> Show Forces
        </label>
        <button id="resetBtn">Reset</button>
      </div>
    </div>
  </div>
  <script src="sim.js"></script>
</body>
</html>
