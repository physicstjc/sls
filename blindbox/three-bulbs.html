<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three-Bulb 3D Blindbox</title>
  <style>
    :root {
      --bg: #eef3fb;
      --ink: #0f172a;
      --line: #c7d1e0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 20% 0%, #ffffff 0%, #eef3fb 60%, #e0e8f5 100%);
    }

    .wrap {
      max-width: 1100px;
      margin: clamp(8px, 2vw, 16px) auto;
      padding: clamp(8px, 1.8vw, 14px);
    }

    .header-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      min-width: 0;
    }

    .title {
      margin: 0;
      font-size: clamp(14px, 2vw, 18px);
      font-weight: 700;
      line-height: 1.1;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .subtitle {
      margin: 0;
      font-size: clamp(11px, 1.5vw, 13px);
      color: #334155;
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
      flex: 1 1 auto;
      min-width: 0;
      line-height: 1.3;
    }

    .top-controls {
      display: flex;
      justify-content: flex-end;
      margin: 0;
      flex: 0 0 auto;
    }

    .toggle-btn {
      border: 1px solid #c7d1e0;
      border-radius: 8px;
      background: #f8fbff;
      color: #0f172a;
      padding: 5px 9px;
      font-size: clamp(11px, 1.4vw, 12px);
      font-weight: 600;
      cursor: pointer;
      line-height: 1.2;
    }

    .toggle-btn:hover {
      border-color: #9fb2d8;
      background: #eef4ff;
    }

    .viewer {
      position: relative;
      height: clamp(420px, 74vh, 760px);
      border: 1px solid var(--line);
      border-radius: 12px;
      background: linear-gradient(180deg, #f8fbff 0%, #e8eff9 100%);
      overflow: hidden;
    }

    .label {
      position: absolute;
      transform: translate(-50%, -50%);
      font-size: clamp(10px, 1.5vw, 12px);
      font-weight: 600;
      color: #dbe4f3;
      text-shadow: 0 1px 2px rgba(15, 23, 42, 0.8);
      pointer-events: none;
      white-space: nowrap;
      text-align: center;
      line-height: 1.25;
    }

    @media (max-width: 900px) {
      .viewer { height: clamp(390px, 70vh, 680px); }
    }

    @media (max-width: 640px) {
      .wrap {
        margin: 6px auto;
        padding: 8px;
      }

      .header-row {
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 6px;
      }

      .subtitle {
        order: 3;
        flex-basis: 100%;
        white-space: normal;
        overflow: visible;
        text-overflow: clip;
        line-height: 1.3;
      }

      .viewer {
        height: clamp(380px, 68vh, 620px);
        border-radius: 10px;
      }

      .label {
        white-space: normal;
        max-width: 120px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header-row">
      <h1 class="title">Three-Bulb 3D Blindbox</h1>
      <p class="subtitle">Click bulbs to remove or restore them, then infer the hidden arrangement from your observations.</p>
      <div class="top-controls">
        <button id="toggle-values" class="toggle-btn" type="button">Show Current/Voltage Values</button>
      </div>
    </div>

    <div id="viewer" class="viewer">
      <div class="label" id="label-0">Bulb 1</div>
      <div class="label" id="label-1">Bulb 2</div>
      <div class="label" id="label-2">Bulb 3</div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.166.1/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.166.1/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const EMF = 12;
    const R = [2, 2, 2];
    const present = [true, true, true];
    const bulbNames = ['Bulb 1', 'Bulb 2', 'Bulb 3'];
    let showValues = false;

    const viewer = document.getElementById('viewer');
    const labels = [0, 1, 2].map(i => document.getElementById('label-' + i));
    const toggleValuesBtn = document.getElementById('toggle-values');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xeef3fb);

    const camera = new THREE.PerspectiveCamera(45, viewer.clientWidth / viewer.clientHeight, 0.1, 100);
    camera.position.set(0, 5.8, 8.0);
    camera.lookAt(0, 1.8, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(viewer.clientWidth, viewer.clientHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    viewer.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enablePan = false;
    controls.target.set(0, 1.8, 0);
    controls.minDistance = 5.2;
    controls.maxDistance = 18;
    controls.maxPolarAngle = Math.PI * 0.48;

    function applyResponsiveView() {
      const width = viewer.clientWidth;
      if (width <= 640) {
        camera.fov = 49;
        camera.position.set(0, 6.6, 10.2);
        controls.target.set(0, 1.45, 0);
        controls.minDistance = 5.8;
        controls.maxDistance = 20;
      } else if (width <= 900) {
        camera.fov = 45;
        camera.position.set(0, 6.2, 9.2);
        controls.target.set(0, 1.65, 0);
        controls.minDistance = 5.5;
        controls.maxDistance = 19;
      } else {
        camera.fov = 42;
        camera.position.set(0, 5.8, 8.0);
        controls.target.set(0, 1.8, 0);
        controls.minDistance = 5.2;
        controls.maxDistance = 18;
      }
      camera.updateProjectionMatrix();
    }

    const hemi = new THREE.HemisphereLight(0xffffff, 0x7f8ea8, 0.75);
    scene.add(hemi);

    const key = new THREE.DirectionalLight(0xffffff, 0.8);
    key.position.set(5, 9, 6);
    key.castShadow = true;
    key.shadow.mapSize.set(2048, 2048);
    scene.add(key);

    const fill = new THREE.DirectionalLight(0xc7d6f5, 0.45);
    fill.position.set(-6, 5, -4);
    scene.add(fill);

    const floor = new THREE.Mesh(
      new THREE.CircleGeometry(11, 64),
      new THREE.MeshStandardMaterial({ color: 0xc4cfdf, roughness: 0.85, metalness: 0.05 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.01;
    floor.receiveShadow = true;
    scene.add(floor);

    const boxGroup = new THREE.Group();
    scene.add(boxGroup);

    const boxBody = new THREE.Mesh(
      new THREE.BoxGeometry(8.8, 1.1, 5.6),
      new THREE.MeshStandardMaterial({ color: 0x7d8798, roughness: 0.55, metalness: 0.15 })
    );
    boxBody.position.y = 0.55;
    boxBody.castShadow = true;
    boxBody.receiveShadow = true;
    boxGroup.add(boxBody);

    const topPlate = new THREE.Mesh(
      new THREE.BoxGeometry(9.0, 0.14, 5.8),
      new THREE.MeshStandardMaterial({ color: 0xaeb8c8, roughness: 0.4, metalness: 0.2 })
    );
    topPlate.position.y = 1.13;
    topPlate.castShadow = true;
    topPlate.receiveShadow = true;
    boxGroup.add(topPlate);

    const bulbSlots = [
      new THREE.Vector3(-2.0, 1.14, 0),
      new THREE.Vector3( 0.0, 1.14, 0),
      new THREE.Vector3( 2.0, 1.14, 0)
    ];

    const bulbs = [];
    const pickTargets = [];
    const removedTransforms = [
      {
        offset: new THREE.Vector3(-0.95, 0.2, -0.55),
        rotation: new THREE.Euler(
          THREE.MathUtils.degToRad(22),
          THREE.MathUtils.degToRad(-28),
          THREE.MathUtils.degToRad(16)
        )
      },
      {
        offset: new THREE.Vector3(0.0, 0.2, -1.05),
        rotation: new THREE.Euler(
          THREE.MathUtils.degToRad(24),
          THREE.MathUtils.degToRad(0),
          THREE.MathUtils.degToRad(0)
        )
      },
      {
        offset: new THREE.Vector3(0.95, 0.2, -0.55),
        rotation: new THREE.Euler(
          THREE.MathUtils.degToRad(22),
          THREE.MathUtils.degToRad(28),
          THREE.MathUtils.degToRad(-16)
        )
      }
    ];

    function createSocketNumber(index) {
      const canvas = document.createElement('canvas');
      canvas.width = 128;
      canvas.height = 72;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(15, 23, 42, 0.82)';
      ctx.strokeStyle = 'rgba(226, 232, 240, 0.92)';
      ctx.lineWidth = 5;
      roundRect(ctx, 10, 7, 108, 58, 20);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#f8fafc';
      ctx.font = '800 46px Segoe UI, Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(index + 1), 64, 37);

      const texture = new THREE.CanvasTexture(canvas);
      texture.anisotropy = renderer.capabilities.getMaxAnisotropy();

      const numberPlate = new THREE.Mesh(
        createCurvedSocketLabelGeometry(),
        new THREE.MeshBasicMaterial({
          map: texture,
          transparent: true,
          depthWrite: false,
          polygonOffset: true,
          polygonOffsetFactor: -2,
          polygonOffsetUnits: -2
        })
      );
      return numberPlate;
    }

    function createCurvedSocketLabelGeometry() {
      const columns = 24;
      const rows = 4;
      const radius = 0.604;
      const arc = 1.1;
      const centerY = 0.27;
      const height = 0.34;
      const positions = [];
      const uvs = [];
      const indices = [];

      for (let row = 0; row <= rows; row++) {
        const v = row / rows;
        const y = centerY + (0.5 - v) * height;

        for (let col = 0; col <= columns; col++) {
          const u = col / columns;
          const angle = (u - 0.5) * arc;
          positions.push(Math.sin(angle) * radius, y, Math.cos(angle) * radius);
          uvs.push(u, 1 - v);
        }
      }

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < columns; col++) {
          const a = row * (columns + 1) + col;
          const b = a + 1;
          const c = a + columns + 1;
          const d = c + 1;
          indices.push(a, c, b, b, c, d);
        }
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      geometry.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
      geometry.setIndex(indices);
      geometry.computeVertexNormals();
      return geometry;
    }

    function roundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    function createBulbBaseThreads() {
      const points = [];
      const turns = 3.35;
      const segments = 120;
      const startY = 0.285;
      const endY = 0.63;
      const radius = 0.368;

      for (let i = 0; i <= segments; i++) {
        const t = i / segments;
        const angle = t * Math.PI * 2 * turns;
        points.push(new THREE.Vector3(
          Math.cos(angle) * radius,
          startY + (endY - startY) * t,
          Math.sin(angle) * radius
        ));
      }

      const thread = new THREE.Mesh(
        new THREE.TubeGeometry(new THREE.CatmullRomCurve3(points), segments, 0.009, 8, false),
        new THREE.MeshStandardMaterial({ color: 0x66707e, roughness: 0.34, metalness: 0.82 })
      );
      thread.castShadow = true;
      return thread;
    }

    function createBulb(index, position) {
      const group = new THREE.Group();
      group.position.copy(position);

      const holder = new THREE.Group();
      group.add(holder);

      const assembly = new THREE.Group();
      group.add(assembly);

      const socketShadow = new THREE.Mesh(
        new THREE.CylinderGeometry(0.68, 0.76, 0.08, 30),
        new THREE.MeshStandardMaterial({ color: 0x364152, roughness: 0.9, metalness: 0.05 })
      );
      socketShadow.position.y = 0.105;
      socketShadow.castShadow = true;
      holder.add(socketShadow);

      const socketMetal = new THREE.Mesh(
        new THREE.CylinderGeometry(0.54, 0.58, 0.34, 30),
        new THREE.MeshStandardMaterial({ color: 0x9ea7b8, roughness: 0.35, metalness: 0.75 })
      );
      socketMetal.position.y = 0.27;
      socketMetal.castShadow = true;
      holder.add(socketMetal);

      holder.add(createSocketNumber(index));

      const base = new THREE.Mesh(
        new THREE.CylinderGeometry(0.34, 0.36, 0.46, 24),
        new THREE.MeshStandardMaterial({ color: 0xb5bfce, roughness: 0.34, metalness: 0.62 })
      );
      base.position.y = 0.46;
      base.castShadow = true;
      assembly.add(base);
      assembly.add(createBulbBaseThreads());

      const bulbMat = new THREE.MeshPhysicalMaterial({
        color: 0xfff4bf,
        emissive: 0x000000,
        emissiveIntensity: 0,
        roughness: 0.14,
        metalness: 0,
        transmission: 0.72,
        thickness: 0.65,
        ior: 1.35,
        clearcoat: 0.4,
        clearcoatRoughness: 0.12
      });
      const globe = new THREE.Mesh(new THREE.SphereGeometry(0.58, 36, 28), bulbMat);
      globe.position.y = 0.98;
      globe.castShadow = true;
      assembly.add(globe);

      const leadMat = new THREE.MeshStandardMaterial({ color: 0x778399, roughness: 0.35, metalness: 0.8 });
      const leftLead = new THREE.Mesh(new THREE.CylinderGeometry(0.016, 0.016, 0.34, 12), leadMat);
      leftLead.position.set(-0.11, 0.76, 0.02);
      assembly.add(leftLead);

      const rightLead = leftLead.clone();
      rightLead.position.x = 0.11;
      assembly.add(rightLead);

      const filamentMat = new THREE.MeshStandardMaterial({
        color: 0x66707e,
        emissive: 0x000000,
        emissiveIntensity: 0,
        roughness: 0.3,
        metalness: 0.55
      });
      const filament = new THREE.Mesh(
        new THREE.TubeGeometry(
          new THREE.CatmullRomCurve3([
            new THREE.Vector3(-0.11, 0.93, 0.02),
            new THREE.Vector3(-0.055, 0.99, 0.03),
            new THREE.Vector3(0, 1.01, 0.035),
            new THREE.Vector3(0.055, 0.99, 0.03),
            new THREE.Vector3(0.11, 0.93, 0.02)
          ]),
          36,
          0.018,
          10,
          false
        ),
        filamentMat
      );
      assembly.add(filament);

      const glow = new THREE.PointLight(0xffd56a, 0, 5.8, 1.35);
      glow.position.y = 0.95;
      assembly.add(glow);

      const pick = new THREE.Mesh(
        new THREE.SphereGeometry(0.65, 20, 16),
        new THREE.MeshBasicMaterial({
          transparent: true,
          opacity: 0,
          colorWrite: false,
          depthWrite: false,
          depthTest: false
        })
      );
      pick.position.y = 0.98;
      pick.userData.index = index;
      assembly.add(pick);
      pickTargets.push(pick);

      scene.add(group);

      return {
        group,
        holder,
        assembly,
        base,
        globe,
        glow,
        filament,
        filamentMat,
        home: group.position.clone(),
        assemblyHome: assembly.position.clone()
      };
    }

    bulbSlots.forEach((pos, i) => bulbs.push(createBulb(i, pos)));

    function parallelEqBulb1Bulb2() {
      const p1 = present[0];
      const p2 = present[1];
      if (!p1 && !p2) return Infinity;
      if (p1 && !p2) return R[0];
      if (!p1 && p2) return R[1];
      return (R[0] * R[1]) / (R[0] + R[1]);
    }

    function solve() {
      const rParallel = parallelEqBulb1Bulb2();
      const r3 = present[2] ? R[2] : Infinity;
      const rTotal = (rParallel === Infinity || r3 === Infinity) ? Infinity : rParallel + r3;
      const iTotal = rTotal === Infinity ? 0 : EMF / rTotal;

      const vParallel = rTotal === Infinity ? 0 : iTotal * rParallel;
      const v3 = rTotal === Infinity ? 0 : iTotal * r3;

      const Vs = [vParallel, vParallel, v3];
      const Is = [0, 0, 0];

      if (present[0]) Is[0] = vParallel / R[0];
      if (present[1]) Is[1] = vParallel / R[1];
      if (present[2]) Is[2] = iTotal;

      return { Vs, Is };
    }

    function sig2(x) {
      if (!isFinite(x)) return '0';
      const s = Number(x).toPrecision(2);
      return s.replace(/\.0+$/, '').replace(/(\..*?)0+$/, '$1');
    }

    function bulbGlowFromVoltage(v) {
      if (v < 2) return { color: 0xf2f7ff, emissive: 0x000000, power: 0, emissiveIntensity: 0 };
      if (v < 5) return { color: 0xffefaa, emissive: 0x4a2a00, power: 1.2, emissiveIntensity: 0.45 };
      if (v < 7) return { color: 0xffd164, emissive: 0x7c3d00, power: 2.8, emissiveIntensity: 0.9 };
      return { color: 0xffb233, emissive: 0xbf5a00, power: 5.6, emissiveIntensity: 1.5 };
    }

    function toggleBulb(i) {
      present[i] = !present[i];
      updateVisuals();
    }

    function updateVisuals() {
      const { Vs, Is } = solve();

      for (let i = 0; i < 3; i++) {
        const bulb = bulbs[i];
        const state = bulbGlowFromVoltage(Vs[i]);

        if (!present[i]) {
          const removed = removedTransforms[i];
          bulb.base.visible = true;
          bulb.assembly.position.copy(bulb.assemblyHome).add(removed.offset);
          bulb.assembly.rotation.copy(removed.rotation);
          bulb.globe.material.color.setHex(0xdfe6f3);
          bulb.globe.material.emissive.setHex(0x000000);
          bulb.globe.material.emissiveIntensity = 0;
          bulb.filamentMat.color.setHex(0x66707e);
          bulb.filamentMat.emissive.setHex(0x000000);
          bulb.filamentMat.emissiveIntensity = 0;
          bulb.glow.intensity = 0;
          continue;
        }

        bulb.group.position.copy(bulb.home);
        bulb.assembly.position.copy(bulb.assemblyHome);
        bulb.assembly.rotation.set(0, 0, 0);
        bulb.base.visible = true;
        bulb.globe.material.color.setHex(state.color);
        bulb.globe.material.emissive.setHex(state.emissive);
        bulb.globe.material.emissiveIntensity = state.emissiveIntensity;
        const filamentPower = Math.min(1.9, state.power * 0.55);
        bulb.filamentMat.color.setHex(filamentPower > 0 ? 0xffd08a : 0x66707e);
        bulb.filamentMat.emissive.setHex(filamentPower > 0 ? 0xff7a1f : 0x000000);
        bulb.filamentMat.emissiveIntensity = filamentPower;
        bulb.glow.intensity = state.power;
      }

      for (let i = 0; i < 3; i++) {
        const current = present[i] ? Is[i] : 0;
        labels[i].innerHTML = showValues
          ? bulbNames[i] + '<br>I=' + sig2(current) + ' A, V=' + sig2(Vs[i]) + ' V'
          : '';
      }
    }

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function onPointerDown(ev) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((ev.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const hit = raycaster.intersectObjects(pickTargets, false)[0];
      if (!hit) return;
      const i = hit.object.userData.index;

      toggleBulb(i);
      updateVisuals();
    }

    renderer.domElement.addEventListener('pointerdown', onPointerDown);

    toggleValuesBtn.addEventListener('click', () => {
      showValues = !showValues;
      toggleValuesBtn.textContent = showValues
        ? 'Hide Current/Voltage Values'
        : 'Show Current/Voltage Values';
      updateVisuals();
    });

    function setOverlayPosition(el, worldPos, yOffset = 0, xOffsetPx = 0) {
      const p = worldPos.clone();
      p.y += yOffset;
      p.project(camera);

      const x = (p.x * 0.5 + 0.5) * viewer.clientWidth + xOffsetPx;
      const y = (1 - (p.y * 0.5 + 0.5)) * viewer.clientHeight;
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.style.display = p.z > 1 ? 'none' : '';
    }

    function updateOverlays() {
      for (let i = 0; i < 3; i++) {
        if (!showValues) {
          labels[i].style.display = 'none';
          continue;
        }
        setOverlayPosition(labels[i], bulbs[i].group.position, -0.85, 0);
      }
    }

    function onResize() {
      applyResponsiveView();
      camera.aspect = viewer.clientWidth / viewer.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(viewer.clientWidth, viewer.clientHeight);
      controls.update();
      updateOverlays();
    }

    window.addEventListener('resize', onResize);

    function tick() {
      controls.update();
      updateOverlays();
      renderer.render(scene, camera);
      requestAnimationFrame(tick);
    }

    updateVisuals();
    applyResponsiveView();
    onResize();
    tick();
  </script>
</body>
</html>
