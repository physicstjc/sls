<style>
:root {
  --bg: #f6f1e9;
  --paper: #fffdf8;
  --ink: #1f2a37;
  --muted: #5b6470;
  --brand: #0e7a86;
  --brand-dark: #0a5f68;
  --accent: #f29f05;
  --line: #e7dfd1;
  --shadow: 0 10px 30px rgba(20, 30, 40, 0.1);
  --radius: 16px;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "Trebuchet MS", "Segoe UI", sans-serif;
  color: var(--ink);
  background:
    radial-gradient(circle at 15% -10%, #ffd8a8 0%, transparent 35%),
    radial-gradient(circle at 90% 10%, #b7ecef 0%, transparent 30%),
    var(--bg);
}
.hero {
  padding: 56px 20px 24px;
}
.hero-inner {
  max-width: 1160px;
  margin: 0 auto;
  background: linear-gradient(130deg, #0e7a86 0%, #0a5f68 100%);
  color: #fff;
  border-radius: 24px;
  padding: 32px;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}
.hero-inner::after {
  content: "";
  position: absolute;
  right: -60px;
  top: -60px;
  width: 220px;
  height: 220px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
}
h1 {
  margin: 0 0 8px;
  font-size: clamp(1.8rem, 3.6vw, 2.7rem);
  letter-spacing: 0.2px;
}
.subtitle {
  margin: 0;
  color: #d8f4f6;
  max-width: 760px;
  line-height: 1.5;
}
.controls {
  max-width: 1160px;
  margin: 16px auto 0;
  padding: 0 20px;
  display: grid;
  gap: 12px;
  grid-template-columns: 1fr auto;
}
.search {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 12px 14px;
  font-size: 1rem;
  background: #fff;
}
.stats {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 180px;
  border-radius: 12px;
  background: #fff;
  border: 1px solid var(--line);
  color: var(--muted);
  padding: 0 12px;
  font-weight: 600;
}
main {
  max-width: 1160px;
  margin: 16px auto 40px;
  padding: 0 20px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 16px;
}
.card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  min-height: 320px;
}
.thumb-wrap {
  background: #f3efe6;
  aspect-ratio: 16 / 9;
  display: flex;
  align-items: center;
  justify-content: center;
  border-bottom: 1px solid var(--line);
}
.thumb {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.thumb-fallback {
  font-size: 0.95rem;
  color: var(--muted);
  padding: 10px;
  text-align: center;
}
.card-body {
  padding: 14px;
  display: flex;
  flex-direction: column;
  flex: 1;
}
.card h2 {
  margin: 0 0 8px;
  font-size: 1.02rem;
  line-height: 1.35;
  min-height: 2.7em;
}
.actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: auto;
}
.btn {
  text-decoration: none;
  display: inline-block;
  border-radius: 10px;
  padding: 8px 10px;
  font-size: 0.88rem;
  font-weight: 700;
}
.btn-primary {
  background: var(--brand);
  color: #fff;
}
.btn-primary:hover { background: var(--brand-dark); }
.btn-secondary {
  border: 1px solid var(--line);
  color: var(--ink);
  background: #fff;
}
.note {
  max-width: 1160px;
  margin: 24px auto 40px;
  padding: 0 20px;
  color: var(--muted);
  font-size: 0.9rem;
}
@media (max-width: 700px) {
  .controls { grid-template-columns: 1fr; }
  .stats { min-height: 44px; }
}
</style>
</head>

  <header class="hero">

const appGrid = document.getElementById('appGrid');
const searchInput = document.getElementById('searchInput');
const stats = document.getElementById('stats');

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function placeholderImage(title) {
  const safe = encodeURIComponent(title);
  const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">'
    + '<defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">'
    + '<stop offset="0%" stop-color="#dbeffd"/><stop offset="100%" stop-color="#fce8c8"/>'
    + '</linearGradient></defs>'
    + '<rect width="960" height="540" fill="url(%23g)"/>'
    + '<rect x="48" y="48" width="864" height="444" rx="24" fill="rgba(255,255,255,0.55)"/>'
    + '<text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle"'
    + ' font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="44" fill="#1f2a37">'
    + safe + '</text></svg>';
  return 'data:image/svg+xml;charset=UTF-8,' + svg;
}

function cardTemplate(app) {
  const thumbSrc = app.screenshot ? app.screenshot : placeholderImage(app.title);
  const imagePart = '<img class="thumb" src="' + escapeHtml(thumbSrc) + '" alt="Screenshot of ' + escapeHtml(app.title) + '" loading="lazy">';

  const downloadPart = app.zip
    ? '<a class="btn btn-secondary" href="' + escapeHtml(app.zip) + '">Download</a>'
    : '';

  return '<article class="card">' +
    '<div class="thumb-wrap">' + imagePart + '</div>' +
    '<div class="card-body">' +
      '<h2>' + escapeHtml(app.title) + '</h2>' +
      '<div class="actions">' +
        '<a class="btn btn-primary" href="' + escapeHtml(app.folder) + '/index.html" target="_blank" rel="noopener">Open App</a>' +
        downloadPart +
      '</div>' +
    '</div>' +
  '</article>';
}

function render(list) {
  appGrid.innerHTML = list.map(cardTemplate).join('');
  stats.textContent = list.length + ' of ' + apps.length + ' apps';
}

searchInput.addEventListener('input', function () {
  const term = searchInput.value.trim().toLowerCase();
  if (!term) {
    render(apps);
    return;
  }
  const filtered = apps.filter(function (app) {
    return (app.title + ' ' + app.folder).toLowerCase().includes(term);
  });
  render(filtered);
});

render(apps);
</script>
