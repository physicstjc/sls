<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lorentz Force 3D Simulation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- KaTeX for math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #1a1a1a; touch-action: none; }
        #container { width: 100vw; height: 100vh; cursor: move; }
        .reset-btn {
            position: absolute;
            top: 12px;
            left: 12px;
            background: #1f2937;
            color: #ffffff;
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            z-index: 10;
        }
        .reset-btn:hover { background: #111827; }
        .display {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #111;
            color: #0f0;
            padding: 8px 20px;
            border-radius: 6px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 2rem;
            border: 3px solid #333;
            text-shadow: 0 0 8px #0f0;
            pointer-events: none;
        }
        .hint {
            position: absolute;
            bottom: 10px;
            right: 15px;
            color: #666;
            font-size: 0.7rem;
            pointer-events: none;
        }
        .start-prompt {
            position: absolute;
            top: 58px;
            left: 12px;
            background: rgba(255, 255, 255, 0.96);
            color: #111827;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 12px;
            font-weight: 700;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            pointer-events: none;
        }
        input[type=range] { width: 100%; cursor: pointer; }
        .label-val { font-weight: bold; color: #d946ef; }
        .toggle-btn { transition: all 0.2s; }
        .toggle-active { background-color: #ef4444; color: white; }
        .math-block { margin-bottom: 4px; display: block; }
    </style>
</head>
<body>

    <button id="resetBtn" class="reset-btn">Reset Apparatus</button>
    <div id="startPrompt" class="start-prompt">Click the switch to start.</div>

    <div class="hint">Click background to rotate | Click components to interact</div>

    <div id="container"></div>

    <script>
        let scene, camera, renderer, scale, magnet, wire, arrowHelper, batteryGroup, switchLever, switchBase;
        let ammeterCanvas, ammeterCtx, ammeterTexture;
        let scaleScreenCanvas, scaleScreenCtx, scaleScreenTexture;
        let rheostatSlider, rheoGroup;
        let baseWeight = 100.00; 
        let targetI = 0;
        let currentI = 0;
        let isSwitchClosed = false;
        let polarityMultiplier = 1; // 1 or -1
        let magnetPolarityMultiplier = 1; // 1 or -1
        
        // Physics context: 
        // Magnetic field B is upward from North to South (Z direction).
        // Current I flows along X.
        // Force on wire F = I(L x B).
        // Force on magnet is -F (Newton's 3rd Law).
        const LORENTZ_CONSTANT = 2.5; 
        const GRAVITY = 9.81;

        // Interaction state
        let isRotatingScene = false;
        let isDraggingSlider = false;
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();
        let previousMouseX = 0;
        let previousMouseY = 0;
        let rotationTheta = Math.PI / 4; 
        let rotationPhi = Math.PI / 6;   
        const cameraRadius = 18;

        const WIRE_HEIGHT = 1.6; 
        const BLOCK_X = 4.5;


        function updateScaleScreen(text) {
            if (!scaleScreenCtx || !scaleScreenTexture) return;
            const w = scaleScreenCanvas.width;
            const h = scaleScreenCanvas.height;
            scaleScreenCtx.clearRect(0, 0, w, h);
            scaleScreenCtx.fillStyle = '#111111';
            scaleScreenCtx.fillRect(0, 0, w, h);
            scaleScreenCtx.strokeStyle = '#2a2a2a';
            scaleScreenCtx.lineWidth = 8;
            scaleScreenCtx.strokeRect(4, 4, w - 8, h - 8);
            scaleScreenCtx.fillStyle = '#22c55e';
            scaleScreenCtx.font = 'bold 86px Courier New';
            scaleScreenCtx.textAlign = 'center';
            scaleScreenCtx.textBaseline = 'middle';
            scaleScreenCtx.fillText(text, w / 2, h / 2 + 2);
            scaleScreenTexture.needsUpdate = true;
        }

        function updateAmmeterScreen(text) {
            if (!ammeterCtx || !ammeterTexture) return;
            const w = ammeterCanvas.width;
            const h = ammeterCanvas.height;
            ammeterCtx.clearRect(0, 0, w, h);
            ammeterCtx.fillStyle = '#020617';
            ammeterCtx.fillRect(0, 0, w, h);
            ammeterCtx.strokeStyle = '#94a3b8';
            ammeterCtx.lineWidth = 10;
            ammeterCtx.strokeRect(4, 4, w - 8, h - 8);
            ammeterCtx.fillStyle = '#86efac';
            ammeterCtx.shadowColor = '#16a34a';
            ammeterCtx.shadowBlur = 14;
            ammeterCtx.font = 'bold 96px Courier New';
            ammeterCtx.textAlign = 'center';
            ammeterCtx.textBaseline = 'middle';
            ammeterCtx.fillText(text, w / 2, h / 2 + 2);
            ammeterCtx.shadowBlur = 0;
            ammeterTexture.needsUpdate = true;
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf5f5f5);

            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
            updateCameraPosition();

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('container').appendChild(renderer.domElement);

            const hLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
            scene.add(hLight);
            const dLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dLight.position.set(5, 10, 7);
            scene.add(dLight);

            // Scale Base
            const baseGeo = new THREE.BoxGeometry(6, 0.8, 6);
            const baseMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
            const sBase = new THREE.Mesh(baseGeo, baseMat);
            sBase.position.y = -0.4;
            scene.add(sBase);

            scaleScreenCanvas = document.createElement('canvas');
            scaleScreenCanvas.width = 512;
            scaleScreenCanvas.height = 180;
            scaleScreenCtx = scaleScreenCanvas.getContext('2d');
            scaleScreenTexture = new THREE.CanvasTexture(scaleScreenCanvas);
            const scaleScreen = new THREE.Mesh(
                new THREE.PlaneGeometry(2.6, 0.75),
                new THREE.MeshBasicMaterial({ map: scaleScreenTexture })
            );
            scaleScreen.position.set(0, -0.38, 3.03);
            scene.add(scaleScreen);
            updateScaleScreen(`${baseWeight.toFixed(2)} g`);

            const plateGeo = new THREE.CylinderGeometry(2.2, 2.2, 0.15, 32);
            const plateMat = new THREE.MeshPhongMaterial({ color: 0xdddddd });
            scale = new THREE.Mesh(plateGeo, plateMat);
            scale.position.y = 0.1;
            scene.add(scale);

            // Magnet setup
            magnet = new THREE.Group();
            const poleGeo = new THREE.BoxGeometry(1.2, 1.8, 1.2);
            const south = new THREE.Mesh(poleGeo, new THREE.MeshPhongMaterial({ color: 0x2222ee }));
            south.position.set(0, 1, -1); 
            const north = new THREE.Mesh(poleGeo, new THREE.MeshPhongMaterial({ color: 0xee2222 }));
            north.position.set(0, 1, 1);  
            const mBase = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.4, 3.3), new THREE.MeshPhongMaterial({ color: 0x555555 }));
            mBase.position.y = 0.2;
            function makeMagnetLabelPlane(text, bgColor) {
                const canvas = document.createElement('canvas');
                canvas.width = 128;
                canvas.height = 128;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = bgColor;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = '#222';
                ctx.lineWidth = 6;
                ctx.strokeRect(3, 3, canvas.width - 6, canvas.height - 6);
                ctx.fillStyle = '#111';
                ctx.font = 'bold 88px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(text, canvas.width / 2, canvas.height / 2 + 4);
                const texture = new THREE.CanvasTexture(canvas);
                return new THREE.Mesh(
                    new THREE.PlaneGeometry(0.95, 0.95),
                    new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide })
                );
            }

            // Put labels on top surfaces of the pole blocks.
            const nLabel = makeMagnetLabelPlane('N', '#ffd7d7');
            nLabel.position.set(0, 1 + 0.9 + 0.01, 1);
            nLabel.rotation.x = -Math.PI / 2;
            const sLabel = makeMagnetLabelPlane('S', '#dbe4ff');
            sLabel.position.set(0, 1 + 0.9 + 0.01, -1);
            sLabel.rotation.x = -Math.PI / 2;

            magnet.add(north, south, mBase, nLabel, sLabel);
            magnet.position.y = 0.18;
            scene.add(magnet);

            // Wooden Supports
            const woodMat = new THREE.MeshPhongMaterial({ color: 0x6f4e37 });
            const supportL = new THREE.Mesh(new THREE.BoxGeometry(0.8, 3, 0.8), woodMat);
            supportL.position.set(-BLOCK_X, 0.7, 0);
            scene.add(supportL);
            const supportR = new THREE.Mesh(new THREE.BoxGeometry(0.8, 3, 0.8), woodMat);
            supportR.position.set(BLOCK_X, 0.7, 0);
            scene.add(supportR);

            // Suspended Wire
            const wireGeo = new THREE.CylinderGeometry(0.04, 0.04, BLOCK_X * 2, 8);
            const wireMat = new THREE.MeshPhongMaterial({ color: 0xbdc3c7, specular: 0xffffff, shininess: 100 }); 
            wire = new THREE.Mesh(wireGeo, wireMat);
            wire.rotation.z = Math.PI / 2;
            wire.position.set(0, WIRE_HEIGHT, 0);
            scene.add(wire);

            // Circuit Wires
            const circuitMat = new THREE.MeshPhongMaterial({ color: 0xcc3333 });
            const leftUp = new THREE.Mesh(new THREE.BoxGeometry(0.06, WIRE_HEIGHT + 0.7, 0.06), circuitMat);
            leftUp.position.set(-(BLOCK_X - 0.43), (WIRE_HEIGHT - 0.7) / 2, 0);
            scene.add(leftUp);
            const rightUp = new THREE.Mesh(new THREE.BoxGeometry(0.06, WIRE_HEIGHT + 0.7, 0.06), circuitMat);
            rightUp.position.set(BLOCK_X - 0.43, (WIRE_HEIGHT - 0.7) / 2, 0);
            scene.add(rightUp);

            // Battery
            batteryGroup = new THREE.Group();
            const batBody = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 1.2, 16), new THREE.MeshPhongMaterial({ color: 0x222222 }));
            batBody.rotation.z = Math.PI / 2;
            const batCap = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.1, 16), new THREE.MeshPhongMaterial({ color: 0xaaaaaa }));
            batCap.rotation.z = Math.PI / 2;
            batCap.position.x = 0.65;
            batteryGroup.add(batBody, batCap);
            batteryGroup.position.set(0, -0.4, 6);
            scene.add(batteryGroup);

            // Switch
            switchBase = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.2, 1.5), new THREE.MeshPhongMaterial({color: 0x333333}));
            switchBase.position.set(-4, -0.7, 4);
            switchBase.rotation.y = Math.PI / 2;
            scene.add(switchBase);
            
            switchLever = new THREE.Group();
            const leverArm = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.5, 0.1), new THREE.MeshPhongMaterial({color: 0x999999}));
            leverArm.position.y = 0.75;
            // Move lever to the end of the base (so it runs along the base when closed)
            switchLever.add(leverArm);
            switchLever.position.set(-4, -0.6, 4 + 0.7); // shift to end of base (base is 1.5 in z)
            switchLever.rotation.y = Math.PI / 2;
            switchLever.rotation.z = 0; 
            scene.add(switchLever);

            // Rheostat
            rheoGroup = new THREE.Group();
            const rheoBodyGeo = new THREE.CylinderGeometry(0.35, 0.35, 2, 32);
            const rheoBodyMat = new THREE.MeshPhongMaterial({ color: 0xdddddd });
            const rheoBody = new THREE.Mesh(rheoBodyGeo, rheoBodyMat);
            rheoBody.rotation.z = Math.PI / 2;
            rheoGroup.add(rheoBody);
            const rheoWireGeo = new THREE.CylinderGeometry(0.36, 0.36, 1.8, 32);
            const rheoWireMat = new THREE.MeshPhongMaterial({ color: 0x3a3a3a });
            const rheoWire = new THREE.Mesh(rheoWireGeo, rheoWireMat);
            rheoWire.rotation.z = Math.PI / 2;
            rheoGroup.add(rheoWire);

            const legShape = new THREE.Shape();
            legShape.moveTo(-0.32, -0.42);
            legShape.lineTo(0.32, -0.42);
            legShape.lineTo(0, 0.52);
            legShape.closePath();
            const legGeo = new THREE.ShapeGeometry(legShape);
            const legMat = new THREE.MeshPhongMaterial({ color: 0x111111, side: THREE.DoubleSide });
            const leftLeg = new THREE.Mesh(legGeo, legMat);
            leftLeg.rotation.y = Math.PI / 2;
            leftLeg.position.set(-1.01, -0.05, 0);
            const rightLeg = new THREE.Mesh(legGeo, legMat);
            rightLeg.rotation.y = Math.PI / 2;
            rightLeg.position.set(1.01, -0.05, 0);
            rheoGroup.add(leftLeg, rightLeg);
            
            const rheoRod = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 2.2, 8), new THREE.MeshPhongMaterial({color: 0xcccccc}));
            rheoRod.rotation.z = Math.PI / 2;
            rheoRod.position.y = 0.5;
            rheoGroup.add(rheoRod);
            
            const sliderGroup = new THREE.Group();
            const sliderContact = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.5), new THREE.MeshPhongMaterial({color: 0xcc3333}));
            sliderContact.position.y = 0.5;
            sliderGroup.add(sliderContact);
            const sliderHandle = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.15, 16), new THREE.MeshPhongMaterial({color: 0xcc3333}));
            sliderHandle.position.y = 0.75;
            sliderGroup.add(sliderHandle);
            rheostatSlider = sliderGroup;
            rheoGroup.add(rheostatSlider);
            rheoGroup.position.set(4, -0.1, 4);
            rheoGroup.rotation.y = Math.PI / 2; 
            scene.add(rheoGroup);

            // Static Circuit Wires
            // Shorten negative terminal wire to only reach from battery (x=0) to switch (x=-4)
            const floorWireL = new THREE.Mesh(new THREE.BoxGeometry(4, 0.04, 0.04), circuitMat);
            floorWireL.position.set(-2, -0.4, 6); scene.add(floorWireL);
            // New routing: straight wire from battery to x=4, then turn to rheostat
            // 1. Long straight wire from battery to rheostat split by ammeter (series connection)
            const batToAmmeterWire = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.04, 0.04), circuitMat);
            batToAmmeterWire.position.set(0.75, -0.4, 6); scene.add(batToAmmeterWire);
            const ammeterToRheoWire = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.04, 0.04), circuitMat);
            ammeterToRheoWire.position.set(3.25, -0.4, 6); scene.add(ammeterToRheoWire);

            const ammeterBody = new THREE.Mesh(
                new THREE.BoxGeometry(1.5, 0.85, 0.85),
                new THREE.MeshPhongMaterial({ color: 0x1f2937 })
            );
            ammeterBody.position.set(2, -0.4, 6);
            scene.add(ammeterBody);

            ammeterCanvas = document.createElement('canvas');
            ammeterCanvas.width = 640;
            ammeterCanvas.height = 180;
            ammeterCtx = ammeterCanvas.getContext('2d');
            ammeterTexture = new THREE.CanvasTexture(ammeterCanvas);
            const ammeterScreen = new THREE.Mesh(
                new THREE.PlaneGeometry(1.32, 0.42),
                new THREE.MeshBasicMaterial({ map: ammeterTexture })
            );
            ammeterScreen.position.set(2, 0.06, 6);
            ammeterScreen.rotation.x = -Math.PI / 2;
            scene.add(ammeterScreen);
            updateAmmeterScreen('0.00 A');
            // 2. Short z wire from (4, -0.4, 6) to (4, -0.4, 4.5)
            const batToRheoZ = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.04, 1.5), circuitMat);
            batToRheoZ.position.set(4, -0.4, 5.25); scene.add(batToRheoZ);
            // 3. Short x wire from (4, -0.4, 4.5) to rheostat (4, -0.1, 4)
            const batToRheoX = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.3, 0.04), circuitMat);
            batToRheoX.position.set(4, -0.25, 4.25); scene.add(batToRheoX);
            const toSwitch = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.04, 2), circuitMat);
            toSwitch.position.set(-4, -0.7, 5); scene.add(toSwitch);
            const leftRailDrop = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.3, 0.04), circuitMat);
            leftRailDrop.position.set(-4, -0.55, 6); scene.add(leftRailDrop);
            const switchLink = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.04, 4), circuitMat);
            switchLink.position.set(-(BLOCK_X - 0.43), -0.7, 2); scene.add(switchLink);
            const rodToApparatusX = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.04, 3), circuitMat);
            rodToApparatusX.position.set(4, -0.7, 1.5); scene.add(rodToApparatusX);
            const rodVertUp = new THREE.Mesh(new THREE.BoxGeometry(0.04, 1.1, 0.04), circuitMat);
            rodVertUp.position.set(4, -0.15, 3); scene.add(rodVertUp);
            const rodToBlockHoriz = new THREE.Mesh(new THREE.BoxGeometry(0.43, 0.04, 0.04), circuitMat);
            rodToBlockHoriz.position.set(BLOCK_X - 0.215, -0.7, 0); scene.add(rodToBlockHoriz);

            arrowHelper = new THREE.ArrowHelper(new THREE.Vector3(1,0,0), new THREE.Vector3(0, WIRE_HEIGHT + 0.18, 0), 1.2, 0xff00ff, 0.35, 0.25);
            arrowHelper.visible = false;
            scene.add(arrowHelper);

            const grid = new THREE.GridHelper(24, 24, 0x888888, 0xcccccc);
            grid.position.y = -0.8;
            scene.add(grid);

            // Interaction
            const container = document.getElementById('container');
            container.addEventListener('mousedown', onPointerDown);
            window.addEventListener('mousemove', onPointerMove);
            window.addEventListener('mouseup', onPointerUp);
            container.addEventListener('touchstart', (e) => onPointerDown(e.touches[0]), {passive: false});
            window.addEventListener('touchmove', (e) => onPointerMove(e.touches[0]), {passive: false});
            window.addEventListener('touchend', onPointerUp);

            document.getElementById('resetBtn').addEventListener('click', () => {
                targetI = 0; currentI = 0; isSwitchClosed = false; polarityMultiplier = 1;
                magnetPolarityMultiplier = 1;
                switchLever.rotation.z = 0;
                batteryGroup.rotation.y = 0;
                magnet.rotation.y = 0;
                updateSliderPositionFromValue();
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();
        }

        function onPointerDown(e) {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const sliderHits = raycaster.intersectObjects([rheostatSlider], true);
            if (sliderHits.length > 0) {
                isDraggingSlider = true;
                container.style.cursor = 'grabbing';
                return;
            }
            const batteryHits = raycaster.intersectObjects([batteryGroup], true);
            if (batteryHits.length > 0) {
                polarityMultiplier *= -1;
                return;
            }
            const magnetHits = raycaster.intersectObjects([magnet], true);
            if (magnetHits.length > 0) {
                magnetPolarityMultiplier *= -1;
                magnet.rotation.y = magnetPolarityMultiplier === 1 ? 0 : Math.PI;
                return;
            }
            // Allow clicking anywhere on the switch base or lever to toggle
            const switchHits = raycaster.intersectObjects([switchBase, switchLever], true);
            if (switchHits.length > 0) {
                toggleSwitch();
                return;
            }
            isRotatingScene = true;
            previousMouseX = e.clientX;
            previousMouseY = e.clientY;
        }

        function onPointerMove(e) {
            if (isDraggingSlider) {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                const planeNormal = new THREE.Vector3(0, 0, 1).applyQuaternion(rheoGroup.quaternion);
                const plane = new THREE.Plane(planeNormal, -rheoGroup.position.dot(planeNormal));
                raycaster.setFromCamera(mouse, camera);
                const intersectPoint = new THREE.Vector3();
                raycaster.ray.intersectPlane(plane, intersectPoint);
                const localPoint = rheoGroup.worldToLocal(intersectPoint);
                let localX = Math.max(-0.9, Math.min(0.9, localPoint.x));
                rheostatSlider.position.x = localX;
                // Enforce min current logic here too
                const minCurrent = 0.1;
                const maxCurrent = 10;
                const sliderVal = ((localX + 0.9) / 1.8) * 10;
                targetI = minCurrent + (maxCurrent - minCurrent) * (1 - sliderVal / 10);
            } else if (isRotatingScene) {
                rotationTheta -= (e.clientX - previousMouseX) * 0.01;
                rotationPhi = Math.max(0.1, Math.min(Math.PI / 2 - 0.1, rotationPhi + (e.clientY - previousMouseY) * 0.01));
                updateCameraPosition();
                previousMouseX = e.clientX; 
                previousMouseY = e.clientY;
            }
        }

        function onPointerUp() {
            isRotatingScene = false;
            isDraggingSlider = false;
            document.getElementById('container').style.cursor = 'move';
        }

        function updateSliderPositionFromValue() {
            // Inverse: leftmost = max current, rightmost = min current
            const minCurrent = 0.1;
            const maxCurrent = 10;
            // Invert the formula to get sliderVal from targetI
            const k = (maxCurrent / minCurrent) - 1;
            // targetI = maxCurrent / (1 + k*norm) => norm = (maxCurrent/targetI - 1)/k
            let norm = (maxCurrent / targetI - 1) / k;
            norm = Math.max(0, Math.min(1, norm));
            const sliderVal = norm * 10;
            rheostatSlider.position.x = (sliderVal / 10) * 1.8 - 0.9;
        }

        function toggleSwitch() {
            isSwitchClosed = !isSwitchClosed;
            switchLever.rotation.z = isSwitchClosed ? -Math.PI/2 : 0;
            const prompt = document.getElementById('startPrompt');
            if (prompt) {
                prompt.style.display = 'none';
            }
        }

        function updateCameraPosition() {
            camera.position.x = cameraRadius * Math.sin(rotationTheta) * Math.cos(rotationPhi);
            camera.position.y = cameraRadius * Math.sin(rotationPhi);
            camera.position.z = cameraRadius * Math.cos(rotationTheta) * Math.cos(rotationPhi);
            camera.lookAt(0, 1, 0);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Logic for smooth current transitions
            const magnitude = isSwitchClosed ? targetI : 0;
            const actualTarget = magnitude * polarityMultiplier;
            currentI += (actualTarget - currentI) * 0.1; 

            // Battery visual rotation
            const targetBatRotation = polarityMultiplier === 1 ? 0 : Math.PI;
            batteryGroup.rotation.y += (targetBatRotation - batteryGroup.rotation.y) * 0.1;

            // Show current arrow as soon as the switch closes.
            if (!isSwitchClosed) {
                arrowHelper.visible = false;
            } else {
                const dir = new THREE.Vector3(currentI >= 0 ? -1 : 1, 0, 0);
                const len = 0.8 + Math.abs(currentI) * 0.12;
                arrowHelper.visible = true;
                arrowHelper.setDirection(dir);
                arrowHelper.setLength(len, 0.35, 0.25);
            }

            updateAmmeterScreen(`${Math.abs(currentI).toFixed(2)} A`);

            // PHYSICS: Newton's Third Law
            // If Lorentz force on wire is DOWN (+L), force on magnet is UP (-L).
            const forceOnWire = currentI * LORENTZ_CONSTANT * magnetPolarityMultiplier;
            const forceOnMagnet = -forceOnWire; // Reaction force

            // Convert magnetic force (mN) to equivalent mass change (g):
            // delta_m(g) = F(mN) / g(9.81)
            const deltaMassG = forceOnMagnet / GRAVITY;

            // Update scale reading
            const newWeight = baseWeight + deltaMassG;
            updateScaleScreen(newWeight.toFixed(2) + " g");

            // Visual response follows reading direction:
            // lower reading -> magnet/plate move up, higher reading -> move down.
            const responseY = -deltaMassG * 0.0025; 
            
            // Apply upward translation for upward force (magnet lifts off scale base slightly)
            scale.position.y = 0.1 + responseY;
            magnet.position.y = 0.18 + responseY;

            // Keep the horizontal conductor fixed in place.
            wire.position.y = WIRE_HEIGHT;

            renderer.render(scene, camera);
        }
        window.onload = init;
    </script>
</body>
</html>
