<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hand Rep Tracker</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #0f172a;
    color: white;
}

button {
    padding: 10px 20px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.start { background: #4f46e5; color: white; }
.stop { background: #dc2626; color: white; }
.reset { background: #374151; color: white; }

canvas {
    margin-top: 15px;
    border-radius: 12px;
    border: 2px solid #1f2937;
}

#rep-count {
    font-size: 48px;
    font-weight: bold;
}

#pose-status {
    font-size: 20px;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<h1>🤖 Hand Rep Tracker</h1>

<button class="start" onclick="start()">Start</button>
<button class="stop" onclick="stop()">Stop</button>
<button class="reset" onclick="resetReps()">Reset</button>

<h2><span id="rep-count">0</span> counter</h2>
<h3 id="pose-status">Pose: -</h3>

<canvas id="canvas"></canvas>
<div id="label-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/fgzMKTXNq/";
const CONFIDENCE_THRESHOLD = 0.8;

let model, webcam, ctx, labelContainer, maxPredictions;
let isRunning = false;
let reps = 0;
let lastPose = null;
let phase = null;

async function init() {
    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    model = await tmPose.load(modelURL, metadataURL);
    maxPredictions = model.getTotalClasses();

    const size = 250;
    webcam = new tmPose.Webcam(size, size, true);

    await webcam.setup();
    await webcam.play();

    const canvas = document.getElementById("canvas");
    canvas.width = size;
    canvas.height = size;
    ctx = canvas.getContext("2d");

    labelContainer = document.getElementById("label-container");
    labelContainer.innerHTML = "";
    for (let i = 0; i < maxPredictions; i++) {
        labelContainer.appendChild(document.createElement("div"));
    }
}

async function start() {
    if (!webcam) {
        await init();
    } else {
        await webcam.play();
    }
    isRunning = true;
    loop();
}

function stop() {
    isRunning = false;
    if (webcam && webcam.stream) {
        webcam.stream.getTracks().forEach(track => track.stop());
    }
}

async function loop() {
    if (!isRunning) return;
    webcam.update();
    await predict();
    requestAnimationFrame(loop);
}

async function predict() {
    const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
    const prediction = await model.predict(posenetOutput);

    for (let i = 0; i < maxPredictions; i++) {
        labelContainer.childNodes[i].innerHTML =
            prediction[i].className + ": " + prediction[i].probability.toFixed(2);
    }

    let best = prediction.reduce((max, p) =>
        p.probability > max.probability ? p : max
    );

    let currentPose =
        best.probability >= CONFIDENCE_THRESHOLD
            ? best.className.toLowerCase()
            : null;

    if (currentPose !== lastPose) {
        if (currentPose === "up") {
            phase = "up";
        } else if (currentPose === "down" && phase === "up") {
            reps++;
            document.getElementById("rep-count").innerText = reps;
            phase = null;
        }

        lastPose = currentPose;
        document.getElementById("pose-status").innerText =
            "Pose: " + (currentPose ? currentPose.toUpperCase() : "-");
    }

    drawPose(pose);
}

function drawPose(pose) {
    ctx.drawImage(webcam.canvas, 0, 0);
    if (pose) {
        const minConfidence = 0.5;
        tmPose.drawKeypoints(pose.keypoints, minConfidence, ctx);
        tmPose.drawSkeleton(pose.keypoints, minConfidence, ctx);
    }
}

function resetReps() {
    reps = 0;
    phase = null;
    lastPose = null;
    document.getElementById("rep-count").innerText = reps;
}
</script>

</body>
</html>
