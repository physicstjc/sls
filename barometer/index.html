<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Barometer</title>
	<meta name="description" content="Interactive barometer simulation with selectable liquids, probe-based pressure readouts, and environment controls for altitude and planets.">
	<link rel="canonical" href="https://physicstjc.github.io/sls/barometer/">
	<meta property="og:type" content="website">
	<meta property="og:title" content="Barometer Simulation">
	<meta property="og:description" content="Explore how barometer pressure readings change with fluid type, altitude, and planet.">
	<meta property="og:url" content="https://physicstjc.github.io/sls/barometer/">
	<meta property="og:image" content="https://physicstjc.github.io/sls/barometer/barometer.png">
	<meta name="twitter:card" content="summary_large_image">
	<meta name="twitter:title" content="Barometer Simulation">
	<meta name="twitter:description" content="Explore how barometer pressure readings change with fluid type, altitude, and planet.">
	<style>
		:root {
			--ink: #172033;
			--muted: #667085;
			--paper: #ffffff;
			--bg: #f5f7fb;
			--panel: #ffffff;
			--line: #dde3ee;
			--line-strong: #b9c3d2;
			--accent: #2563eb;
			--surface: #eef5fb;
			--radius: 8px;
			--space: clamp(10px, 2vw, 18px);
		}

		* {
			box-sizing: border-box;
		}

		html {
			min-height: 100%;
			background: var(--bg);
		}

		body {
			background: var(--bg);
			font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			color: var(--ink);
			line-height: 1.5;
			margin: 0;
			min-height: 100vh;
			padding: var(--space);
		}

		.main-container {
			width: min(1180px, 100%);
			margin: 0 auto;
			min-height: calc(100vh - (var(--space) * 2));
			display: flex;
			flex-direction: column;
			gap: 14px;
		}

		#topTitleBar {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 12px;
			flex: 0 0 auto;
		}

		#topTitleBar h1 {
			margin: 0;
			color: var(--ink);
			font-size: clamp(1.25rem, 3vw, 2rem);
			line-height: 1.1;
			font-weight: 760;
			letter-spacing: 0;
		}

		.sim-layout {
			display: grid;
			grid-template-columns: minmax(220px, 280px) minmax(0, 1fr);
			gap: 14px;
			align-items: stretch;
			flex: 1 1 auto;
			min-height: 0;
		}

		.info-box {
			background-color: var(--panel);
			border: 1px solid var(--line);
			border-radius: var(--radius);
			padding: 14px;
			font-size: 0.9rem;
			color: var(--ink);
			height: 100%;
			overflow: auto;
			display: flex;
			flex-direction: column;
			gap: 12px;
			box-shadow: 0 1px 2px rgba(16, 24, 40, 0.04);
		}

		.controls-toggle {
			display: none;
			align-items: center;
			justify-content: space-between;
			gap: 10px;
			width: 100%;
			background: var(--panel);
			border: 1px solid var(--line);
			border-radius: var(--radius);
			color: var(--ink);
			font: inherit;
			font-weight: 680;
			padding: 10px 12px;
		}

		.controls-toggle::after {
			content: "";
			width: 8px;
			height: 8px;
			border-bottom: 2px solid currentColor;
			border-right: 2px solid currentColor;
			transform: rotate(45deg);
			transition: transform 0.18s ease;
		}

		.info-box.controls-open .controls-toggle::after {
			transform: rotate(225deg);
		}

		.controls-content {
			display: contents;
		}

		.control-group {
			background: var(--panel);
			border: 1px solid var(--line);
			border-radius: var(--radius);
			padding: 12px;
		}

		.control-group:focus-within {
			border-color: var(--accent);
			box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
		}

		.control-label {
			font-weight: 680;
			color: var(--ink);
			font-size: 0.76rem;
			margin-bottom: 8px;
			display: block;
			text-transform: uppercase;
			letter-spacing: 0.08em;
		}

		.tiny-help {
			font-size: 0.76rem;
			color: var(--muted);
			margin-top: 8px;
			display: block;
			line-height: 1.35;
		}

		select,
		input[type="range"] {
			width: 100%;
		}

		select {
			appearance: none;
			border: 1px solid var(--line-strong);
			border-radius: 6px;
			padding: 9px 34px 9px 10px;
			background:
				linear-gradient(45deg, transparent 50%, var(--muted) 50%) right 15px center / 6px 6px no-repeat,
				linear-gradient(135deg, var(--muted) 50%, transparent 50%) right 10px center / 6px 6px no-repeat,
				white;
			color: var(--ink);
			font-weight: 580;
			font-size: 0.94rem;
			line-height: 1.2;
		}

		select:focus,
		input[type=range]:focus {
			outline: 2px solid var(--accent);
			outline-offset: 2px;
		}

		input[type=range] {
			-webkit-appearance: none;
			appearance: none;
			background: transparent;
			min-height: 30px;
		}

		input[type=range]::-webkit-slider-runnable-track {
			height: 4px;
			cursor: pointer;
			background: var(--line-strong);
			border-radius: 999px;
		}

		input[type=range]::-webkit-slider-thumb {
			height: 20px;
			width: 20px;
			background: var(--accent);
			cursor: pointer;
			-webkit-appearance: none;
			margin-top: -8px;
			border: 3px solid #ffffff;
			border-radius: 999px;
			box-shadow: 0 1px 4px rgba(16, 24, 40, 0.25);
		}

		.value-row {
			margin-top: 8px;
			font-size: 0.84rem;
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 10px;
			color: var(--muted);
		}

		.value-row strong {
			color: var(--ink);
			font-weight: 680;
			text-align: right;
		}

		.canvas-wrap {
			position: relative;
			display: flex;
			justify-content: center;
			align-items: center;
			width: 100%;
			height: 100%;
			min-height: 0;
			overflow: hidden;
			padding: 12px;
			background: var(--panel);
			border: 1px solid var(--line);
			border-radius: var(--radius);
			box-shadow: 0 1px 2px rgba(16, 24, 40, 0.04);
		}

		canvas {
			background-color: var(--surface);
			border: 1px solid var(--line);
			border-radius: 6px;
			cursor: crosshair;
			width: auto;
			height: auto;
			max-width: 100%;
			max-height: 100%;
			display: block;
			margin: 0 auto;
			touch-action: none;
		}

		.btn-reset {
			background-color: var(--ink);
			color: #ffffff;
			padding: 10px 12px;
			border-radius: 6px;
			font-weight: 680;
			font-size: 0.88rem;
			border: 1px solid var(--ink);
			width: 100%;
			margin-top: 10px;
			transition: background-color 0.2s, border-color 0.2s;
		}

		.btn-reset:hover {
			background-color: var(--accent);
			border-color: var(--accent);
		}

		@media (max-width: 760px) {
			body {
				padding: 10px;
			}

			.main-container {
				min-height: calc(100vh - 20px);
				gap: 10px;
			}

			.sim-layout {
				grid-template-columns: 1fr;
				grid-template-rows: auto minmax(0, 1fr);
				gap: 10px;
			}

			.info-box {
				display: grid;
				grid-template-columns: 1fr;
				gap: 10px;
				height: auto;
				max-height: 44vh;
				padding: 10px;
			}

			.canvas-wrap {
				min-height: 360px;
				padding: 8px;
			}
		}

		@media (min-width: 520px) and (max-width: 760px) {
			.info-box {
				grid-template-columns: repeat(3, minmax(0, 1fr));
				max-height: none;
				overflow: visible;
			}
		}

		@media (max-width: 480px) {
			.info-box {
				max-height: none;
				overflow: visible;
			}

			.controls-toggle {
				display: flex;
			}

			.info-box:not(.controls-open) .controls-content {
				display: none;
			}
		}

		@media (min-width: 1180px) {
			.sim-layout {
				grid-template-columns: 300px minmax(0, 1fr);
			}
		}
	</style>
</head>
<body>
	<div class="main-container">
		<header id="topTitleBar" aria-label="Simulation top title bar">
			<h1>Barometer</h1>
		</header>

		<div class="sim-layout">
			<aside class="info-box" aria-label="Controls panel">
				<button id="controlsToggle" class="controls-toggle" type="button" aria-expanded="false" aria-controls="controlsContent">Controls</button>
				<div id="controlsContent" class="controls-content">
					<div class="control-group">
						<span class="control-label">Barometer Liquid</span>
						<select id="liquidSelect" aria-label="Choose barometer liquid"></select>
						<div class="value-row">
							<span>Density</span>
							<strong id="densityLabel">-</strong>
						</div>
						<span class="tiny-help">Different fluid densities change how quickly pressure rises with depth.</span>
					</div>

					<div class="control-group">
						<span class="control-label">Planet</span>
						<select id="planetSelect" aria-label="Choose planet"></select>
						<div class="value-row">
							<span>Gravity</span>
							<strong id="gravityLabel">-</strong>
						</div>
						<div class="value-row">
							<span>P<sub>atm</sub></span>
							<strong id="atmLabel">-</strong>
						</div>
					</div>

					<div class="control-group">
						<span class="control-label">Altitude (m)</span>
						<input id="altitudeSlider" type="range" min="0" max="10000" step="100" value="0" aria-label="Set altitude">
						<div class="value-row">
							<span>Current altitude</span>
							<strong id="altitudeLabel">0 m</strong>
						</div>
						<button id="resetBtn" class="btn-reset">Reset View</button>
					</div>
				</div>
			</aside>

			<div class="canvas-wrap">
				<canvas id="simCanvas" width="760" height="520" aria-label="Barometer simulation canvas"></canvas>
			</div>
		</div>
	</div>

	<script>
		const liquids = [
			{ key: "mercury", name: "Mercury", density: 13595, color: "#b8bcc6" },
			{ key: "water", name: "Water", density: 1000, color: "#5ec8ff" },
			{ key: "glycerin", name: "Glycerin", density: 1260, color: "#b2dcff" },
			{ key: "ethanol", name: "Ethanol", density: 789, color: "#9be8ff" },
			{ key: "saltwater", name: "Saltwater", density: 1030, color: "#53bfff" }
		];

		const planets = [
			{ key: "earth", name: "Earth", gravity: 9.81, p0: 101325 },
			{ key: "mars", name: "Mars", gravity: 3.71, p0: 610 },
			{ key: "venus", name: "Venus", gravity: 8.87, p0: 9200000 },
			{ key: "moon", name: "Moon", gravity: 1.62, p0: 0.0000003 }
		];

		const canvas = document.getElementById("simCanvas");
		const ctx = canvas.getContext("2d");

		const liquidSelect = document.getElementById("liquidSelect");
		const planetSelect = document.getElementById("planetSelect");
		const altitudeSlider = document.getElementById("altitudeSlider");
		const resetBtn = document.getElementById("resetBtn");
		const controlsPanel = document.querySelector(".info-box");
		const controlsToggle = document.getElementById("controlsToggle");

		const densityLabel = document.getElementById("densityLabel");
		const gravityLabel = document.getElementById("gravityLabel");
		const atmLabel = document.getElementById("atmLabel");
		const altitudeLabel = document.getElementById("altitudeLabel");

		const FLASK = {
			x: 120,
			y: 330,
			width: 380,
			height: 170
		};

		const TUBE = {
			x: 365,
			y: 10,
			width: 90,
			height: 400
		};
		const BASE_CANVAS_WIDTH = 760;
		const BASE_CANVAS_HEIGHT = 520;
		const DEFAULT_TUBE_Y = 10;
		const SCALE_HEIGHT_PX = FLASK.y - DEFAULT_TUBE_Y;
        const TUBE_WALL_PX = 2;
        const TUBE_INNER_WIDTH_PX = TUBE.width - 2 * TUBE_WALL_PX;
		const DEFAULT_RESERVOIR_SURFACE_Y = FLASK.y + 70;

		const TUBE_BOTTOM_MARGIN_PX = 8;
		const TUBE_MIN_SUBMERGED_PX = 10;

		const PROBE_RADIUS = 9;
		const P_MAX_VISUAL = 12000000;
		const AIR_MOLAR_MASS = 0.0289644;
		const GAS_R = 8.314462618;
		const STANDARD_AIR_TEMP_K = 288.15;

		const state = {
			liquidKey: "mercury",
			planetKey: "earth",
			altitudeM: 0,
			isDraggingProbe: false,
			isDraggingTube: false,
			tubeDragOffsetY: 0,
			probe: {
				x: 340,
				y: 180
			}
		};

		function setupSelectOptions() {
			liquids.forEach((liquid) => {
				const option = document.createElement("option");
				option.value = liquid.key;
				option.textContent = liquid.name;
				liquidSelect.appendChild(option);
			});

			planets.forEach((planet) => {
				const option = document.createElement("option");
				option.value = planet.key;
				option.textContent = planet.name;
				planetSelect.appendChild(option);
			});

			liquidSelect.value = state.liquidKey;
			planetSelect.value = state.planetKey;
		}

		function getLiquid() {
			return liquids.find((liquid) => liquid.key === state.liquidKey);
		}

		function getPlanet() {
			return planets.find((planet) => planet.key === state.planetKey);
		}

		function clamp(value, min, max) {
			return Math.min(max, Math.max(min, value));
		}

		function atmosphericPressurePa() {
			const planet = getPlanet();
			const exponent = -(AIR_MOLAR_MASS * planet.gravity * state.altitudeM) / (GAS_R * STANDARD_AIR_TEMP_K);
			return planet.p0 * Math.exp(exponent);
		}

		function columnHeightM() {
			const liquid = getLiquid();
			const planet = getPlanet();
			const pAtm = atmosphericPressurePa();
			if (planet.gravity <= 0 || liquid.density <= 0) {
				return 0;
			}
			return pAtm / (liquid.density * planet.gravity);
		}

		function scaleMaxM() {
			const h = columnHeightM();
			const liquid = getLiquid();

			// Mercury barometers are commonly read on a 0-1 m scale (for ~760 mm near Earth).
			if (liquid.key === "mercury" && h <= 1) {
				return 1;
			}

			const target = Math.max(0.5, h * 1.35);
			const magnitude = Math.pow(10, Math.floor(Math.log10(target)));
			const normalized = target / magnitude;
			let niceNormalized;

			if (normalized <= 1) {
				niceNormalized = 1;
			} else if (normalized <= 2) {
				niceNormalized = 2;
			} else if (normalized <= 5) {
				niceNormalized = 5;
			} else {
				niceNormalized = 10;
			}

			return Math.min(20000, niceNormalized * magnitude);
		}

		function columnHeightPx() {
			const maxM = scaleMaxM();
			return clamp((columnHeightM() / maxM) * SCALE_HEIGHT_PX, 2, SCALE_HEIGHT_PX - 2);
		}

		function reservoirSurfaceY() {
			return DEFAULT_RESERVOIR_SURFACE_Y;
		}

		function liquidTopY() {
			return reservoirSurfaceY() - columnHeightPx();
		}

		function isInTube(x, y) {
			return x >= TUBE.x && x <= TUBE.x + TUBE.width && y >= TUBE.y && y <= TUBE.y + TUBE.height;
		}

		function isOnTubeForDrag(x, y) {
			const pad = 10;
			return x >= TUBE.x - pad && x <= TUBE.x + TUBE.width + pad && y >= TUBE.y && y <= TUBE.y + TUBE.height;
		}

		function clampTubeY(y) {
			const minY = 2;
			const maxBottom = FLASK.y + FLASK.height - TUBE_BOTTOM_MARGIN_PX;
			const minBottom = DEFAULT_RESERVOIR_SURFACE_Y + TUBE_MIN_SUBMERGED_PX;
			const maxY = maxBottom - TUBE.height;
			const minAllowedY = Math.max(minY, minBottom - TUBE.height);
			return clamp(y, minAllowedY, maxY);
		}

		function isInReservoir(y) {
			const surfaceY = reservoirSurfaceY();
			return y >= surfaceY && y <= FLASK.y + FLASK.height;
		}

		function inLiquidAt(x, y) {
			if (isInTube(x, y)) {
				return y >= liquidTopY();
			}
			if (x >= FLASK.x && x <= FLASK.x + FLASK.width && isInReservoir(y)) {
				return true;
			}
			return false;
		}

		function pressureAtProbePa() {
			const pAir = atmosphericPressurePa();
			const liquid = getLiquid();
			const planet = getPlanet();
			const surfaceY = reservoirSurfaceY();
			const colTopY = liquidTopY();
			const colHeightM = columnHeightM();
			const colHeightPx = Math.max(1e-6, columnHeightPx());
			const metersPerPxInColumn = colHeightM / colHeightPx;

			if (isInTube(state.probe.x, state.probe.y) && state.probe.y < colTopY) {
				// Vacuum region at the top of a barometer tube.
				return 0;
			}

			if (!inLiquidAt(state.probe.x, state.probe.y)) {
				return pAir;
			}

			let liquidSurfaceY = surfaceY;
			let depthM;
			if (isInTube(state.probe.x, state.probe.y)) {
				liquidSurfaceY = colTopY;
				const depthPxInColumn = Math.max(0, state.probe.y - liquidSurfaceY);
				depthM = depthPxInColumn * metersPerPxInColumn;
				return liquid.density * planet.gravity * depthM;
			}

			const depthPx = Math.max(0, state.probe.y - liquidSurfaceY);
			depthM = depthPx * metersPerPxInColumn;
			return pAir + liquid.density * planet.gravity * depthM;
		}

		function paToMmOfCurrentLiquid(pa) {
			const liquid = getLiquid();
			const planet = getPlanet();
			const denom = liquid.density * planet.gravity;
			if (denom <= 0) {
				return 0;
			}
			return (pa / denom) * 1000;
		}

		function fmt(value, digits) {
			return Number(value).toLocaleString(undefined, {
				maximumFractionDigits: digits,
				minimumFractionDigits: digits
			});
		}

		function pressureColor(pa) {
			const t = clamp(pa / P_MAX_VISUAL, 0, 1);
			const r = Math.round(80 + 170 * t);
			const g = Math.round(210 - 150 * t);
			const b = Math.round(255 - 185 * t);
			return `rgb(${r}, ${g}, ${b})`;
		}

		function drawBackground() {
			ctx.setTransform(1, 0, 0, 1, 0, 0);
			ctx.clearRect(0, 0, canvas.width, canvas.height);
			const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
			sky.addColorStop(0, "#f5f9ff");
			sky.addColorStop(1, "#eef4f8");
			ctx.fillStyle = sky;
			ctx.fillRect(0, 0, canvas.width, canvas.height);
		}

		function drawBarometer() {
			const liquid = getLiquid();
			const topY = liquidTopY();
			const surfaceY = reservoirSurfaceY();

			ctx.fillStyle = "#ffffff";
			ctx.fillRect(TUBE.x, TUBE.y, TUBE.width, TUBE.height);
			ctx.strokeStyle = "#172033";
			ctx.lineWidth = 2;
			ctx.strokeRect(TUBE.x, TUBE.y, TUBE.width, TUBE.height);

			ctx.fillStyle = liquid.color;
			ctx.fillRect(TUBE.x + TUBE_WALL_PX, topY, TUBE_INNER_WIDTH_PX, TUBE.y + TUBE.height - topY - TUBE_WALL_PX);

			ctx.fillStyle = liquid.color;
			ctx.fillRect(FLASK.x, surfaceY, FLASK.width, FLASK.y + FLASK.height - surfaceY);
			ctx.strokeStyle = "#172033";
			ctx.lineWidth = 2;
			ctx.beginPath();
			ctx.moveTo(FLASK.x, FLASK.y);
			ctx.lineTo(FLASK.x, FLASK.y + FLASK.height);
			ctx.lineTo(FLASK.x + FLASK.width, FLASK.y + FLASK.height);
			ctx.lineTo(FLASK.x + FLASK.width, FLASK.y);
			ctx.stroke();

			// Redraw the tube edges over the reservoir so the column container remains visible below the surface.
			ctx.strokeStyle = "#172033";
			ctx.lineWidth = 2;
			ctx.beginPath();
			ctx.moveTo(TUBE.x, surfaceY);
			ctx.lineTo(TUBE.x, TUBE.y + TUBE.height);
			ctx.moveTo(TUBE.x + TUBE.width, surfaceY);
			ctx.lineTo(TUBE.x + TUBE.width, TUBE.y + TUBE.height);
			ctx.stroke();

			ctx.fillStyle = "#172033";
			ctx.font = "650 16px system-ui, sans-serif";
			ctx.fillText("Vacuum", TUBE.x + TUBE.width + 16, TUBE.y + 26);
			ctx.beginPath();
			ctx.moveTo(TUBE.x + TUBE.width + 10, TUBE.y + 20);
			ctx.lineTo(TUBE.x + TUBE.width - 4, TUBE.y + 20);
			ctx.strokeStyle = "#172033";
			ctx.lineWidth = 2;
			ctx.stroke();

			ctx.fillStyle = "#172033";
			ctx.font = "650 16px system-ui, sans-serif";
			ctx.fillText("Liquid column", TUBE.x + TUBE.width + 16, topY + 20);
			ctx.beginPath();
			ctx.moveTo(TUBE.x + TUBE.width + 10, topY + 15);
			ctx.lineTo(TUBE.x + TUBE.width - 4, topY + 15);
			ctx.stroke();
		}

		function drawScale() {
			const surface = reservoirSurfaceY();
			const top = surface - SCALE_HEIGHT_PX;
			const maxM = scaleMaxM();

			ctx.strokeStyle = "#172033";
			ctx.lineWidth = 2;
			ctx.beginPath();
			ctx.moveTo(TUBE.x - 26, top);
			ctx.lineTo(TUBE.x - 26, surface);
			ctx.stroke();

			const colHeightM = columnHeightM();
			for (let i = 0; i <= 10; i += 1) {
				const y = top + (i / 10) * (surface - top);
				ctx.beginPath();
				ctx.moveTo(TUBE.x - 26, y);
				ctx.lineTo(TUBE.x - 14, y);
				ctx.stroke();

				const mAtTick = ((10 - i) / 10) * maxM;
				if (i % 2 === 0) {
					ctx.fillStyle = "#172033";
					ctx.font = "650 14px system-ui, sans-serif";
					const digits = maxM < 10 ? 1 : 0;
					ctx.fillText(`${fmt(mAtTick, digits)} m`, TUBE.x - 66, y + 4);
				}
			}

			const colTop = liquidTopY();
			ctx.strokeStyle = "#ef4b7d";
			ctx.lineWidth = 2;
			ctx.beginPath();
			ctx.moveTo(TUBE.x - 30, colTop);
			ctx.lineTo(TUBE.x + TUBE.width + 4, colTop);
			ctx.stroke();

			ctx.fillStyle = "#172033";
			ctx.font = "650 15px system-ui, sans-serif";
			const columnLabelY = clamp(TUBE.y + TUBE.height + 22, 18, BASE_CANVAS_HEIGHT - 10);
			ctx.fillText(`Column height: ${fmt(colHeightM, 2)} m`, TUBE.x - 20, columnLabelY);
		}

		function drawProbe() {
			const pa = pressureAtProbePa();
			const c = pressureColor(pa);
			const x = state.probe.x;
			const y = state.probe.y;

			ctx.fillStyle = c;
			ctx.beginPath();
			ctx.arc(x, y, PROBE_RADIUS + 5, 0, Math.PI * 2);
			ctx.fill();

			ctx.fillStyle = "#ef4b7d";
			ctx.strokeStyle = "#172033";
			ctx.lineWidth = 2;
			ctx.beginPath();
			ctx.arc(x, y, PROBE_RADIUS, 0, Math.PI * 2);
			ctx.fill();
			ctx.stroke();

			ctx.fillStyle = "#172033";
			ctx.font = "650 15px system-ui, sans-serif";
			ctx.fillText("Probe", x + 15, y - 12);

			ctx.fillStyle = "rgba(255,255,255,0.95)";
			ctx.strokeStyle = "#172033";
			ctx.lineWidth = 2;
			const labelW = 220;
			const labelH = 56;
			const labelX = clamp(x + 16, 8, BASE_CANVAS_WIDTH - labelW - 8);
			const labelY = clamp(y + 10, 8, BASE_CANVAS_HEIGHT - labelH - 8);
			ctx.fillRect(labelX, labelY, labelW, labelH);
			ctx.strokeRect(labelX, labelY, labelW, labelH);

			ctx.fillStyle = "#172033";
			ctx.font = "650 14px system-ui, sans-serif";
			ctx.fillText(`P = ${fmt(pa, 0)} Pa`, labelX + 8, labelY + 20);
			ctx.fillText(`${fmt(paToMmOfCurrentLiquid(pa), 1)} mm ${getLiquid().name}`, labelX + 8, labelY + 40);
		}

		function sceneViewport() {
			const scale = Math.min(canvas.width / BASE_CANVAS_WIDTH, canvas.height / BASE_CANVAS_HEIGHT);
			return {
				scale,
				offsetX: (canvas.width - BASE_CANVAS_WIDTH * scale) / 2,
				offsetY: (canvas.height - BASE_CANVAS_HEIGHT * scale) / 2
			};
		}

		function updateLabels() {
			const liquid = getLiquid();
			const planet = getPlanet();

			densityLabel.textContent = `${fmt(liquid.density, 0)} kg/m³`;
			gravityLabel.textContent = `${fmt(planet.gravity, 2)} m/s²`;
			atmLabel.textContent = `${fmt(atmosphericPressurePa(), 0)} Pa`;
			altitudeLabel.textContent = `${fmt(state.altitudeM, 0)} m`;
		}

		function render() {
			drawBackground();
			const viewport = sceneViewport();
			ctx.save();
			ctx.translate(viewport.offsetX, viewport.offsetY);
			ctx.scale(viewport.scale, viewport.scale);
			drawBarometer();
			drawScale();
			drawProbe();
			ctx.restore();
			updateLabels();
		}

		function getPointerPos(event) {
			const rect = canvas.getBoundingClientRect();
			const viewport = sceneViewport();
			const canvasX = (event.clientX - rect.left) * (canvas.width / rect.width);
			const canvasY = (event.clientY - rect.top) * (canvas.height / rect.height);
			return {
				x: (canvasX - viewport.offsetX) / viewport.scale,
				y: (canvasY - viewport.offsetY) / viewport.scale
			};
		}

		function bindEvents() {
			controlsToggle.addEventListener("click", () => {
				const isOpen = controlsPanel.classList.toggle("controls-open");
				controlsToggle.setAttribute("aria-expanded", String(isOpen));
				controlsToggle.textContent = isOpen ? "Hide controls" : "Controls";
				resizeCanvas();
			});

			liquidSelect.addEventListener("change", (event) => {
				state.liquidKey = event.target.value;
				render();
			});

			planetSelect.addEventListener("change", (event) => {
				state.planetKey = event.target.value;
				render();
			});

			altitudeSlider.addEventListener("input", (event) => {
				state.altitudeM = Number(event.target.value);
				render();
			});

			resetBtn.addEventListener("click", () => {
				state.liquidKey = "mercury";
				state.planetKey = "earth";
				state.altitudeM = 0;
				TUBE.y = DEFAULT_TUBE_Y;
				state.probe.x = 340;
				state.probe.y = 196;

				liquidSelect.value = state.liquidKey;
				planetSelect.value = state.planetKey;
				altitudeSlider.value = String(state.altitudeM);
				render();
			});

			canvas.addEventListener("pointerdown", (event) => {
				const pointer = getPointerPos(event);
				const dx = pointer.x - state.probe.x;
				const dy = pointer.y - state.probe.y;
				const dist2 = dx * dx + dy * dy;

				if (dist2 <= (PROBE_RADIUS + 12) * (PROBE_RADIUS + 12)) {
					state.isDraggingProbe = true;
					canvas.setPointerCapture(event.pointerId);
					return;
				}

				if (isOnTubeForDrag(pointer.x, pointer.y)) {
					state.isDraggingTube = true;
					state.tubeDragOffsetY = pointer.y - TUBE.y;
					canvas.setPointerCapture(event.pointerId);
				}
			});

			canvas.addEventListener("pointermove", (event) => {
				const pointer = getPointerPos(event);

				if (state.isDraggingProbe) {
					state.probe.x = clamp(pointer.x, 8, BASE_CANVAS_WIDTH - 8);
					state.probe.y = clamp(pointer.y, 8, BASE_CANVAS_HEIGHT - 8);
					render();
					return;
				}

				if (state.isDraggingTube) {
					TUBE.y = clampTubeY(pointer.y - state.tubeDragOffsetY);
					render();
				}
			});

			function stopDragging(event) {
				if (state.isDraggingProbe || state.isDraggingTube) {
					state.isDraggingProbe = false;
					state.isDraggingTube = false;
					if (event && canvas.hasPointerCapture(event.pointerId)) {
						canvas.releasePointerCapture(event.pointerId);
					}
				}
			}

			canvas.addEventListener("pointerup", stopDragging);
			canvas.addEventListener("pointercancel", stopDragging);
			canvas.addEventListener("pointerleave", stopDragging);
		}

		function resizeCanvas() {
			const parent = canvas.parentElement;
			const parentStyles = window.getComputedStyle(parent);
			const horizontalPadding = parseFloat(parentStyles.paddingLeft) + parseFloat(parentStyles.paddingRight);
			const verticalPadding = parseFloat(parentStyles.paddingTop) + parseFloat(parentStyles.paddingBottom);
			const parentWidth = Math.max(1, parent.clientWidth - horizontalPadding);
			const parentHeight = Math.max(1, parent.clientHeight - verticalPadding);
			const pixelRatio = window.devicePixelRatio || 1;

			// Fill the wrapper while drawing the simulation with a uniform internal scale.
			canvas.width = Math.round(parentWidth * pixelRatio);
			canvas.height = Math.round(parentHeight * pixelRatio);
			canvas.style.width = `${Math.round(parentWidth)}px`;
			canvas.style.height = `${Math.round(parentHeight)}px`;

			const centerTube = BASE_CANVAS_WIDTH / 2;
			TUBE.x = centerTube - TUBE.width / 2;
			TUBE.y = clampTubeY(TUBE.y);
			FLASK.x = centerTube - FLASK.width / 2;

			state.probe.x = clamp(state.probe.x, 8, BASE_CANVAS_WIDTH - 8);
			state.probe.y = clamp(state.probe.y, 8, BASE_CANVAS_HEIGHT - 8);
			render();
		}

		function init() {
			setupSelectOptions();
			bindEvents();
			resizeCanvas();
			window.addEventListener("resize", resizeCanvas);
		}

		init();
	</script>
</body>
</html>
