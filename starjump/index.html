<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Star Jump Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }
        .canvas-container {
            position: relative;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            background: #1e293b;
        }
        #canvas {
            width: 100%;
            height: auto;
            transform: scaleX(-1);
        }
        .status-badge {
            transition: all 0.05s ease;
        }
        .pulse-up {
            box-shadow: 0 0 20px #fbbf24;
            border-color: #fbbf24;
        }
        .pulse-down {
            box-shadow: 0 0 20px #34d399;
            border-color: #34d399;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .reset-anim {
            animation: shake 0.2s ease-in-out;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8">

    <div class="max-w-2xl w-full space-y-6">
        <div class="text-center space-y-2">
            <h1 class="text-4xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 uppercase">
                Star Jump Tracker
            </h1>
            <p class="text-slate-400">Ensure that the camera can see your whole body.</p>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 text-center relative overflow-hidden group">
                <span class="text-slate-400 text-sm uppercase font-bold tracking-wider relative z-10">Total Jumps</span>
                <div id="counter" class="text-6xl font-black text-emerald-400 mt-1 transition-transform duration-75 relative z-10">0</div>
                
                <button onclick="resetCounter()" class="absolute top-2 right-2 p-2 text-slate-500 hover:text-red-400 transition-colors z-20" title="Reset Count">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                </button>
            </div>
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 text-center flex flex-col justify-center items-center">
                <span class="text-slate-400 text-sm uppercase font-bold tracking-wider mb-2">Pose State</span>
                <div id="status-display" class="status-badge px-4 py-2 rounded-full border-2 border-slate-600 text-lg font-bold">
                    Standby
                </div>
            </div>
        </div>

        <div class="canvas-container bg-black aspect-square flex items-center justify-center">
            <canvas id="canvas"></canvas>
            <div id="loading-overlay" class="absolute inset-0 bg-slate-900 flex flex-col items-center justify-center z-10">
                <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent mb-4"></div>
                <p id="loading-text">Optimizing for speed...</p>
                <button id="start-btn" onclick="init()" class="mt-4 px-8 py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl transition-all shadow-lg hover:shadow-blue-500/25">
                    Start Tracker
                </button>
            </div>
        </div>

        <div id="message-box" class="text-center h-8 text-blue-400 font-medium italic"></div>

        <details class="bg-slate-800/50 rounded-lg p-2 border border-slate-700">
            <summary class="text-xs text-slate-500 cursor-pointer uppercase tracking-widest px-2">Real-time Data</summary>
            <div id="label-container" class="mt-2 text-sm space-y-1 font-mono px-2 text-slate-400"></div>
        </details>
    </div>

    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/LzOG4PR7I/";
        let model, webcam, ctx, labelContainer, maxPredictions;
        
        let count = 0;
        let hasReachedUp = false;
        let lastJumpTime = 0;
        let lastDetectedPose = "";

        // Performance Config
        const CONFIDENCE_THRESHOLD = 0.70; // Lowered for faster snap detection
        const COOLDOWN_MS = 150; // Minimum time between pose changes
        
        async function init() {
            document.getElementById("start-btn").disabled = true;
            document.getElementById("loading-text").innerText = "Warming up GPU...";
            
            await tf.setBackend('webgl');
            
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            try {
                model = await tmPose.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                const size = 300; 
                const flip = true; 
                webcam = new tmPose.Webcam(size, size, flip); 
                await webcam.setup(); 
                await webcam.play();
                
                document.getElementById("loading-overlay").classList.add("hidden");
                
                const canvas = document.getElementById("canvas");
                canvas.width = size; canvas.height = size;
                ctx = canvas.getContext("2d");
                
                labelContainer = document.getElementById("label-container");
                for (let i = 0; i < maxPredictions; i++) {
                    labelContainer.appendChild(document.createElement("div"));
                }

                window.requestAnimationFrame(loop);
            } catch (e) {
                console.error(e);
                document.getElementById("loading-text").innerText = "Camera Error.";
            }
        }

        async function loop(timestamp) {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
            const prediction = await model.predict(posenetOutput);

            let topClass = "";
            let maxProb = 0;

            for (let i = 0; i < maxPredictions; i++) {
                const prob = prediction[i].probability;
                if (prob > maxProb) {
                    maxProb = prob;
                    topClass = prediction[i].className;
                }
                if (Math.random() > 0.8) {
                    labelContainer.childNodes[i].innerText = `${prediction[i].className}: ${(prob * 100).toFixed(0)}%`;
                }
            }

            processInstantLogic(topClass, maxProb);
            drawPose(pose);
        }

        function processInstantLogic(poseName, confidence) {
            const now = Date.now();
            const statusDisplay = document.getElementById("status-display");
            const counterDisplay = document.getElementById("counter");

            // Only act if confidence is high enough and it's a new pose
            if (confidence < CONFIDENCE_THRESHOLD || poseName === lastDetectedPose) return;
            
            // Limit how often the state can flicker
            if (now - lastJumpTime < 100) return;

            lastDetectedPose = poseName;

            if (poseName === "Up" && !hasReachedUp) {
                hasReachedUp = true;
                statusDisplay.innerText = "UP";
                statusDisplay.className = "status-badge px-4 py-2 rounded-full border-2 text-lg font-bold pulse-up border-yellow-400 text-yellow-400";
                lastJumpTime = now;
            } 
            
            if (poseName === "Down" && hasReachedUp) {
                if (now - lastJumpTime > COOLDOWN_MS) {
                    count++;
                    hasReachedUp = false; 
                    counterDisplay.innerText = count;
                    statusDisplay.innerText = "DOWN";
                    statusDisplay.className = "status-badge px-4 py-2 rounded-full border-2 text-lg font-bold pulse-down border-emerald-400 text-emerald-400";
                    
                    counterDisplay.style.transform = "scale(1.3)";
                    setTimeout(() => counterDisplay.style.transform = "scale(1)", 80);
                    lastJumpTime = now;
                }
            }
        }

        function resetCounter() {
            count = 0;
            hasReachedUp = false;
            lastDetectedPose = "";
            const counterDisplay = document.getElementById("counter");
            counterDisplay.innerText = "0";
            counterDisplay.classList.add("reset-anim");
            setTimeout(() => counterDisplay.classList.remove("reset-anim"), 200);
        }

        function drawPose(pose) {
            if (webcam.canvas) {
                ctx.drawImage(webcam.canvas, 0, 0);
                if (pose) {
                    const minPartConfidence = 0.5;
                    tmPose.drawKeypoints(pose.keypoints, minPartConfidence, ctx);
                    tmPose.drawSkeleton(pose.keypoints, minPartConfidence, ctx);
                }
            }
        }
    </script>
</body>
</html>
