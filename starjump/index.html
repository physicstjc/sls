<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Jump Counter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4 font-sans">

    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Star Jump Counter</h1>
        <p class="text-gray-500 mb-6 text-sm">Ignoring Squats Automatically</p>

        <!-- Counter Display -->
        <div class="bg-blue-50 border-2 border-blue-200 rounded-xl p-6 mb-6">
            <span class="block text-gray-600 uppercase tracking-widest text-xs font-semibold">Repetitions</span>
            <span id="jump-count" class="text-6xl font-black text-blue-600 transition-transform duration-200 inline-block">0</span>
        </div>

        <!-- Feedback Messages -->
        <div id="status-message" class="mb-4 min-h-[1.25rem] text-sm font-medium text-orange-500 italic">
            Waiting for camera...
        </div>

        <!-- Camera Canvas -->
        <div class="relative inline-block rounded-lg overflow-hidden border-4 border-gray-200 bg-black mb-6 w-full max-w-[300px] shadow-inner">
            <canvas id="canvas" class="w-full h-auto"></canvas>
            <div id="state-overlay" class="absolute top-2 left-2 bg-black/50 text-white px-2 py-1 rounded text-[10px] uppercase font-bold tracking-wider">
                Ready
            </div>
        </div>

        <!-- Controls -->
        <div class="flex flex-col gap-3">
            <button type="button" onclick="init()" id="start-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition-all transform active:scale-95 shadow-md">
                Start Counter
            </button>
            <button type="button" onclick="resetCounter()" class="text-gray-400 hover:text-gray-600 text-sm font-medium underline">
                Reset Count
            </button>
        </div>

        <!-- Error Log -->
        <div id="error-log" class="mt-4 text-xs text-red-600 hidden bg-red-50 p-3 rounded border border-red-100 text-left overflow-auto max-h-32"></div>
        
        <div id="label-container" class="mt-6 text-left text-[10px] text-gray-300 font-mono hidden"></div>
    </div>

    <script type="text/javascript">
        const MODEL_URL = "https://teachablemachine.withgoogle.com/models/iKjAmq-2j/"; 
        
        let model, webcam, ctx, labelContainer, maxPredictions;
        let count = 0;
        let isAtPeak = false; 
        const PROBABILITY_THRESHOLD = 0.85;

        function showError(msg, details = "") {
            const status = document.getElementById("status-message");
            const log = document.getElementById("error-log");
            status.innerText = msg;
            status.className = "mb-4 min-h-[1.25rem] text-sm font-medium text-red-500 font-bold";
            if (details) {
                log.innerText = `Error Details: ${details}`;
                log.classList.remove("hidden");
            }
            document.getElementById("start-btn").disabled = false;
            document.getElementById("start-btn").innerText = "Retry Connection";
        }

        async function init() {
            const startBtn = document.getElementById("start-btn");
            const statusMsg = document.getElementById("status-message");
            const errorLog = document.getElementById("error-log");
            
            startBtn.disabled = true;
            statusMsg.innerText = "Loading AI Model...";
            errorLog.classList.add("hidden");
            
            try {
                // Ensure TF backend is initialized without repeating warnings
                if (!tf.getBackend()) {
                    await tf.setBackend('webgl');
                }

                const baseUrl = MODEL_URL.endsWith('/') ? MODEL_URL : MODEL_URL + '/';
                const modelURL = baseUrl + "model.json";
                const metadataURL = baseUrl + "metadata.json";

                model = await tmPose.load(modelURL, metadataURL).catch(e => {
                    throw new Error(`Failed to load model from ${modelURL}. Ensure the model is 'Published'.`);
                });
                
                maxPredictions = model.getTotalClasses();

                const size = 300;
                webcam = new tmPose.Webcam(size, size, true); 
                
                await webcam.setup().catch(e => {
                    throw new Error("Webcam access denied. Please check permissions.");
                });
                
                await webcam.play();
                window.requestAnimationFrame(loop);

                const canvas = document.getElementById("canvas");
                canvas.width = size; canvas.height = size;
                ctx = canvas.getContext("2d");
                
                labelContainer = document.getElementById("label-container");
                labelContainer.innerHTML = "";
                for (let i = 0; i < maxPredictions; i++) {
                    labelContainer.appendChild(document.createElement("div"));
                }
                
                statusMsg.innerText = "Active - Start Star Jumps!";
                statusMsg.className = "mb-4 min-h-[1.25rem] text-sm font-medium text-green-600 font-bold";
                startBtn.classList.add("hidden");

            } catch (err) {
                console.error(err);
                showError("Connection Error", err.message);
            }
        }

        async function loop(timestamp) {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
            const prediction = await model.predict(posenetOutput);

            let currentClass = "";
            let highestProb = 0;

            for (let i = 0; i < maxPredictions; i++) {
                const p = prediction[i].probability;
                const name = prediction[i].className;
                if (p > highestProb) {
                    highestProb = p;
                    currentClass = name;
                }
                labelContainer.childNodes[i].innerHTML = `${name}: ${p.toFixed(2)}`;
            }

            const overlay = document.getElementById("state-overlay");

            if (currentClass.toLowerCase().includes("star jump") && highestProb > PROBABILITY_THRESHOLD) {
                if (!isAtPeak) {
                    count++;
                    updateDisplay();
                    isAtPeak = true; 
                    triggerAnimation();
                }
                overlay.innerText = "JUMP DETECTED";
                overlay.className = "absolute top-2 left-2 bg-green-600 text-white px-2 py-1 rounded text-[10px] font-bold";
            } else if (currentClass.toLowerCase().includes("neutral") || currentClass.toLowerCase().includes("squat") || highestProb < 0.5) {
                isAtPeak = false;
                overlay.innerText = currentClass;
                overlay.className = "absolute top-2 left-2 bg-black/50 text-white px-2 py-1 rounded text-[10px]";
            }

            drawPose(pose);
        }

        function updateDisplay() {
            document.getElementById("jump-count").innerText = count;
        }

        function resetCounter() {
            count = 0;
            updateDisplay();
        }

        function triggerAnimation() {
            const display = document.getElementById("jump-count");
            display.style.transform = "scale(1.3)";
            display.classList.add("text-green-500");
            setTimeout(() => {
                display.style.transform = "scale(1)";
                display.classList.remove("text-green-500");
            }, 300);
        }

        function drawPose(pose) {
            if (webcam.canvas) {
                ctx.drawImage(webcam.canvas, 0, 0);
                if (pose) {
                    const minPartConfidence = 0.5;
                    tmPose.drawKeypoints(pose.keypoints, minPartConfidence, ctx);
                    tmPose.drawSkeleton(pose.keypoints, minPartConfidence, ctx);
                }
            }
        }
    </script>
</body>
</html>
